spring:
  application:
    name: api-gateway

  # R2DBC (Reactive DB — auth tables)
  r2dbc:
    url: r2dbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:threat_detection}
    username: ${POSTGRES_USER:threat_user}
    password: ${POSTGRES_PASSWORD:threat_password}
    pool:
      initial-size: 2
      max-size: 10
      max-idle-time: 30m
  
  # Cloud Gateway配置
  cloud:
    gateway:
      # 全局CORS配置
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origin-patterns: "*"
            allowed-methods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowed-headers: "*"
            allow-credentials: true
            max-age: 3600
      
      # 熔断配置
      httpclient:
        connect-timeout: 3000
        response-timeout: 10s
      
      # 路由发现
      discovery:
        locator:
          enabled: false  # 手动配置路由，不使用服务发现

  # Redis配置 (限流)
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

# 服务器配置
server:
# use 8888 instead of 8088 to align with docker-compose exposure
  port: ${SERVER_PORT:8888}
  shutdown: graceful
  
  # 错误处理
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never
    include-exception: false

# 网关配置
gateway:
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    capacity: ${RATE_LIMIT_CAPACITY:100}  # 令牌桶容量
    refill-rate: ${RATE_LIMIT_REFILL_RATE:10}  # 每秒填充令牌数
  health-check:
    data-ingestion-url: ${DATA_INGESTION_HEALTH_URL:http://localhost:8080/actuator/health}
    stream-processing-url: ${STREAM_PROCESSING_HEALTH_URL:http://localhost:8081/overview}
    threat-assessment-url: ${THREAT_ASSESSMENT_HEALTH_URL:http://localhost:8083/api/v1/assessment/health}
    alert-management-url: ${ALERT_MANAGEMENT_HEALTH_URL:http://localhost:8082/actuator/health}
    customer-management-url: ${CUSTOMER_MANAGEMENT_HEALTH_URL:http://localhost:8084/actuator/health}
    threat-intelligence-url: ${THREAT_INTELLIGENCE_HEALTH_URL:http://localhost:8085/actuator/health}
    ml-detection-url: ${ML_DETECTION_HEALTH_URL:http://localhost:8086/health}
    kafka-bootstrap: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# 日志配置
logging:
  level:
    root: INFO
    com.threatdetection.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/api-gateway.log
    max-size: 10MB
    max-history: 30

# Actuator监控
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:defaultSecretKeyThatShouldBeChangedInProduction1234567890}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}           # 1 hour
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:86400000}  # 24 hours

# 应用信息
info:
  app:
    name: API Gateway
    description: Unified API Gateway for Threat Detection System
    version: 1.0.0
    author: Threat Detection Team
