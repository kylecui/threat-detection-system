# Server Configuration
server.port=8080

# Spring Application Configuration
spring.application.name=data-ingestion-service

# Phase 1A: Kafka Producer Optimization
# 连接池和重试配置
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

# Phase 1A: 性能优化配置
# 批量发送配置
spring.kafka.producer.batch-size=16384
spring.kafka.producer.linger-ms=5
spring.kafka.producer.compression-type=snappy

# Phase 1A: 重试和容错配置
spring.kafka.producer.retries=3
spring.kafka.producer.retry.backoff.ms=100
spring.kafka.producer.acks=1

# Phase 1A: 连接池配置
spring.kafka.producer.properties.max.in.flight.requests.per.connection=5
spring.kafka.producer.properties.connections.max.idle.ms=540000

# Phase 1A: 缓冲区配置
spring.kafka.producer.buffer-memory=33554432
spring.kafka.producer.properties.request.timeout.ms=30000
spring.kafka.producer.properties.delivery.timeout.ms=120000

# Phase 1A: 消费者配置 (用于监控和健康检查)
spring.kafka.consumer.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=data-ingestion-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

# Logging Configuration
logging.level.com.threatdetection=INFO
logging.level.org.springframework.kafka=INFO
logging.level.org.apache.kafka=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Application Configuration
app.name=data-ingestion-service
app.version=1.0.0

# Phase 1A: 异步处理配置
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=8
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=batch-ingestion-

# Phase 1A: 管理端点配置 (用于监控)
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.metrics.export.prometheus.enabled=true

# Phase 1A: JVM监控
management.metrics.enable.jvm=true
management.metrics.enable.kafka=true
