# Docker profile configuration for data-ingestion-service
# This profile is used when running in Docker containers

# Database Configuration
spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/threat_detection
    username: threat_user
    password: threat_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

# Kafka Configuration (Docker network)
# 必须覆盖application.properties中的localhost:9092设置
  kafka:
    bootstrap-servers: kafka:29092
    consumer:
      bootstrap-servers: kafka:29092  # 明确覆盖consumer设置
      group-id: data-ingestion-persistence
      auto-offset-reset: earliest
      enable-auto-commit: true
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      bootstrap-servers: kafka:29092  # 明确覆盖producer设置
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
    listener:
      ack-mode: record

# Logging
logging:
  level:
    com.threatdetection: DEBUG
    org.springframework.orm.jpa: DEBUG
    org.springframework.transaction: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.kafka: DEBUG
    org.apache.kafka: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE