# Docker profile configuration for data-ingestion-service
# This profile is used when running in Docker containers

# Database Configuration
spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/threat_detection
    username: threat_user
    password: threat_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

# Kafka Configuration (Docker network)
  kafka:
    bootstrap-servers: kafka:29092

# Logging
logging:
  level:
    com.threatdetection: DEBUG
    org.springframework.orm.jpa: DEBUG
    org.springframework.transaction: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE