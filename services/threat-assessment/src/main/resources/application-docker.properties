# Docker Environment Configuration
# This file contains configuration for Docker environment only

# Database Configuration
spring.datasource.jdbc-url=jdbc:postgresql://postgres:5432/threat_detection
spring.datasource.username=threat_user
spring.datasource.password=threat_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Kafka Configuration
spring.kafka.bootstrap-servers=kafka:29092
spring.kafka.consumer.group-id=threat-assessment-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.producer.acks=1
spring.kafka.producer.retries=3
spring.kafka.producer.batch-size=16384
spring.kafka.producer.linger-ms=5
spring.kafka.producer.compression-type=snappy

# Custom Kafka Topics
kafka.topics.threat-alerts=threat-alerts
kafka.topics.ml-threat-detections=ml-threat-detections

# Redis Configuration (for caching)
spring.data.redis.host=redis
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms
spring.data.redis.database=0

# Cache Configuration
cache.threat-intelligence.ttl=3600
cache.assessments.ttl=1800

# ML Weight Integration (Phase 2)
ml.weight.enabled=${ML_WEIGHT_ENABLED:false}
ml.weight.cache-ttl=${ML_WEIGHT_CACHE_TTL:300}
