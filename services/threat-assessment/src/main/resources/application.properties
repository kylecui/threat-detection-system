# Server Configuration
# server.port=8081
# use server.port=8083 for threat-assessment-service to align with docker exposure
server.port=8083
spring.application.name=threat-assessment-service

# Default configuration - no database for local development
# Database configuration is in application-docker.properties for Docker environment

# Logging Configuration
logging.level.com.threatdetection.assessment=INFO
logging.level.org.springframework.kafka=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Metrics Configuration
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}

# Assessment Configuration
assessment.risk-thresholds.critical=1000
assessment.risk-thresholds.high=500
assessment.risk-thresholds.medium=100
assessment.risk-thresholds.low=10
assessment.risk-thresholds.info=0

assessment.cache.ttl=1800
assessment.intelligence.enabled=true

# Async Configuration
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=8
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=assessment-async-

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ML Weight Integration (Phase 2)
ml.weight.enabled=false
ml.weight.cache-ttl=300
