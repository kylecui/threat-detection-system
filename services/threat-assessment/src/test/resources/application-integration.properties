# Integration Test Configuration
# 使用Testcontainers启动真实的PostgreSQL和Kafka

# Server Configuration
server.port=8084
spring.application.name=threat-assessment-service-integration-test

# Database Configuration (will be overridden by Testcontainers)
spring.datasource.url=jdbc:postgresql://localhost:5432/threat_detection_test
spring.datasource.username=test
spring.datasource.password=test
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Kafka Configuration (will be overridden by Testcontainers)
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=threat-assessment-integration-test
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all

# Logging Configuration
logging.level.com.threatdetection.assessment=DEBUG
logging.level.org.springframework.test=INFO
logging.level.org.testcontainers=INFO
logging.level.org.springframework.kafka=INFO

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Test Properties
spring.profiles.active=test