# H2 Integration Test Configuration
# 使用H2内存数据库进行集成测试

# Server Configuration
server.port=8085
spring.application.name=threat-assessment-service-h2-test

# Database Configuration - H2
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never

# Disable Kafka for H2 testing
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

# Disable Redis for H2 testing
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

# Logging Configuration
logging.level.com.threatdetection.assessment=DEBUG
logging.level.org.springframework.test=INFO
logging.level.org.testcontainers=INFO
logging.level.org.springframework.orm.jpa=INFO
logging.level.org.springframework.jdbc=INFO

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Test Properties
spring.profiles.active=h2-test