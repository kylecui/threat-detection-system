      Kept intentionally conservative. Do not over-trust based on a loose hostname match.

  generic_vpn_proxy_indicators:
    enabled: true
    match:
      hostname_keywords:
        - vpn
        - proxy
        - relay
        - tunnel
      rdns_keywords:
        - vpn
        - proxy
        - relay
        - tunnel
    tags:
      - vpn_or_proxy_service
