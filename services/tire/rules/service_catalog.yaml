      Weak heuristic only. Use as enrichment, not as final classification.

matching_logic:
  organization_match_weight: 1.0
  asn_match_weight: 1.0
  hostname_keyword_match_weight: 0.7
  rdns_keyword_match_weight: 0.7
  multiple_match_bonus: 0.2

thresholds:
  min_confidence_to_apply: 0.70
  min_match_score_to_apply: 1.0

conflict_notes:
  - >
    A match to cloud_provider, cdn, shared_infrastructure, or enterprise_service
    must reduce confidence of direct malicious attribution when only weak abuse
    reports are present.
  - >
    internet_scanner and benign_scanner should not automatically reduce risk to zero;
    they indicate a different class of activity and should be interpreted with context.
  - >
    hosting_provider alone is not proof of benignness or maliciousness. It only
    indicates infrastructure type.
  - >
    Weak heuristic tags such as generic_vpn_proxy_indicators must not drive final
    high-confidence decisions by themselves.
