# 二、`rules/service_catalog.yaml` 初稿

version: 1
description: >
  Initial service catalog for semantic infrastructure identification.
  This catalog is used to reduce false positives by tagging well-known
  cloud providers, CDNs, enterprise services, email security providers,
  and known scanner/measurement infrastructure.

defaults:
  match_mode: any
  case_insensitive: true

global_tags:
  cloud_provider:
    description: Public cloud or large-scale service infrastructure
  cdn:
    description: Content delivery network or edge delivery service
  shared_infrastructure:
    description: Shared frontend, anycast, CDN, or multi-tenant edge infrastructure
  microsoft_service:
    description: Microsoft-owned or Microsoft-operated service infrastructure
  google_service:
    description: Google-owned or Google-operated service infrastructure
  email_security:
    description: Email security / filtering / relay infrastructure
  internet_scanner:
    description: Internet-wide scanner or measurement infrastructure
  security_vendor:
    description: Security vendor infrastructure
  enterprise_service:
    description: Enterprise SaaS or common enterprise service
  benign_scanner:
    description: Benign or research/measurement scanner
  hosting_provider:
    description: Hosting provider or large hosting network
  dns_provider:
    description: DNS infrastructure or resolver service
  edge_network:
    description: Edge delivery or traffic acceleration network
  vpn_or_proxy_service:
    description: VPN / proxy / relay style infrastructure
  measurement_infrastructure:
    description: Research or Internet measurement infrastructure

providers:

  microsoft:
    enabled: true
    match:
      organizations:
        - microsoft
        - microsoft corporation
      asns:
        - AS8075
      hostname_keywords:
        - microsoft
        - office
        - office365
        - outlook
        - teams
        - sharepoint
        - onedrive
        - xbox
        - msedge
        - windowsupdate
        - visualstudio
        - defender
        - ecs.office.com
      rdns_keywords:
        - microsoft
        - msedge
        - office
        - outlook
        - teams
    tags:
      - cloud_provider
      - microsoft_service
      - enterprise_service
      - shared_infrastructure
    confidence: 0.95
    notes: >
      Microsoft public cloud, enterprise SaaS, Office 365, Defender,
      update, edge, and shared service infrastructure.

  azure:
    enabled: true
    match:
      organizations:
        - microsoft azure
        - azure
      hostname_keywords:
        - azure
        - cloudapp.net
        - trafficmanager.net
        - azurefd.net
        - windows.net
      rdns_keywords:
        - cloudapp
        - azure
    tags:
      - cloud_provider
      - microsoft_service
      - shared_infrastructure
    confidence: 0.90
    notes: >
      Azure cloud and Azure edge style infrastructure. Shared hosting and
      shared service risk must be considered.

  google:
    enabled: true
    match:
      organizations:
        - google
        - google llc
      asns:
        - AS15169
      hostname_keywords:
        - google
        - googleapis
        - gstatic
        - googleusercontent
        - gvt1
        - youtube
        - 1e100.net
      rdns_keywords:
        - 1e100.net
        - google
        - gvt1
    tags:
      - cloud_provider
      - google_service
      - enterprise_service
      - shared_infrastructure
    confidence: 0.95
    notes: >
      Google cloud and Google service infrastructure, including common
      shared frontend and Google API endpoints.

  gcp:
    enabled: true
    match:
      organizations:
        - google cloud
        - google cloud platform
      hostname_keywords:
        - googleusercontent
        - cloud.google
      rdns_keywords:
        - googleusercontent
    tags:
      - cloud_provider
      - google_service
      - shared_infrastructure
    confidence: 0.90

  cloudflare:
    enabled: true
    match:
      organizations:
        - cloudflare
        - cloudflare inc
      asns:
        - AS13335
      hostname_keywords:
        - cloudflare
        - cloudflare-dns
        - workers.dev
        - pages.dev
        - cloudflarenet
      rdns_keywords:
        - cloudflare
    tags:
      - cloud_provider
      - cdn
      - dns_provider
      - edge_network
      - shared_infrastructure
    confidence: 0.95
    notes: >
      Cloudflare operates CDN, DNS, proxy, and shared edge infrastructure.
      Reputation-only blocking should be avoided.

  akamai:
    enabled: true
    match:
      organizations:
