# Server Configuration
server.port=8084
spring.application.name=alert-management-service

# Database Configuration (uses environment variables for flexibility)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:testdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Kafka Configuration (for local development)
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=alert-management-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.producer.acks=1
spring.kafka.producer.retries=3
spring.kafka.producer.batch-size=16384
spring.kafka.producer.linger-ms=5
spring.kafka.producer.compression-type=snappy

# Custom Kafka Topics
app.kafka.topics.threat-events=threat-events

# Redis Configuration (for local development)
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms
spring.data.redis.database=1

# Cache Configuration
cache.alerts.ttl=3600
cache.notifications.ttl=1800

# Mail Configuration
spring.mail.host=smtp.163.com
spring.mail.port=587
spring.mail.username=threat_detection@163.com
spring.mail.password=TTXWjJiuxmE2HCRE
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# SMS Configuration
sms.provider=twilio
# Twilio Configuration
sms.twilio.account-sid=${TWILIO_ACCOUNT_SID:}
sms.twilio.auth-token=${TWILIO_AUTH_TOKEN:}
sms.twilio.phone-number=${TWILIO_PHONE_NUMBER:}
# Aliyun Configuration
sms.aliyun.access-key-id=${ALIYUN_ACCESS_KEY_ID:}
sms.aliyun.access-key-secret=${ALIYUN_ACCESS_KEY_SECRET:}
sms.aliyun.sign-name=${ALIYUN_SMS_SIGN_NAME:}
sms.aliyun.template-code=${ALIYUN_SMS_TEMPLATE_CODE:}

# Slack Configuration
slack.webhook.url=${SLACK_WEBHOOK_URL:}

# Teams Configuration
teams.webhook.url=${TEAMS_WEBHOOK_URL:}

# Logging Configuration
logging.level.com.threatdetection.alert=INFO
logging.level.org.springframework.kafka=INFO
logging.level.org.springframework.mail=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Metrics Configuration
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}

# Alert Management Configuration
alert.deduplication.enabled=true
alert.deduplication.time-window=300
alert.deduplication.similarity-threshold=0.8

alert.escalation.enabled=true
alert.escalation.check-interval=60
alert.escalation.max-levels=3

alert.notification.retry-attempts=3
alert.notification.retry-delay=30
alert.notification.templates.enabled=true

# Async Configuration
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=16
spring.task.execution.pool.queue-capacity=1000
spring.task.execution.thread-name-prefix=alert-async-

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Integration Test Configuration
integration-test.enabled=true
integration-test.email.recipient=kylecui@outlook.com