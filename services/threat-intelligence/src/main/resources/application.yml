server:
  port: 8085

spring:
  application:
    name: threat-intelligence
  datasource:
    url: jdbc:postgresql://${DATABASE_HOST:localhost}:${DATABASE_PORT:5432}/${DATABASE_NAME:threat_detection}
    username: ${DATABASE_USERNAME:threat_user}
    password: ${DATABASE_PASSWORD:threat_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    com.threatdetection.intelligence: INFO
    org.hibernate.SQL: WARN
