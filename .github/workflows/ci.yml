name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  java-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Compile all Maven modules
        run: mvn clean compile -DskipTests

      - name: Run tests for Java modules with tests
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t test_modules < <(for d in services/*; do
            if [ -f "$d/pom.xml" ] && [ -d "$d/src/test" ]; then
              printf '%s\n' "$d"
            fi
          done)

          if [ ${#test_modules[@]} -eq 0 ]; then
            echo "No Java modules with tests found."
            exit 0
          fi

          for module in "${test_modules[@]}"; do
            echo "Running tests for $module"
            mvn -pl "$module" test
          done

      - name: Upload Java test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: java-test-reports
          path: |
            services/**/target/surefire-reports/*
            services/**/target/failsafe-reports/*
          if-no-files-found: ignore

  python-lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r services/ml-detection/requirements.txt
          pip install -r services/tire/requirements.txt

      - name: Run ML Detection tests (if present)
        shell: bash
        run: |
          if [ -d "services/ml-detection/tests" ]; then
            python -m pytest services/ml-detection/tests/ --tb=short -q
          else
            echo "No tests found in services/ml-detection/tests"
          fi

      - name: Run TIRE tests (if present)
        shell: bash
        run: |
          if [ -d "services/tire/tests" ]; then
            python -m pytest services/tire/tests/ --tb=short -q
          else
            echo "No tests found in services/tire/tests"
          fi

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache npm and node_modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            frontend/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Lint frontend (if script exists)
        shell: bash
        run: |
          if npm run | grep -qE '^\s+lint$'; then
            npm run lint
          else
            echo "No lint script found in frontend/package.json"
          fi

  kustomize-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl (with kustomize support)
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl
          kubectl version --client

      - name: Validate base kustomize
        run: kubectl kustomize k8s/base >/dev/null

      - name: Validate development overlay
        run: kubectl kustomize k8s/overlays/development >/dev/null

      - name: Validate production overlay
        run: kubectl kustomize k8s/overlays/production >/dev/null
