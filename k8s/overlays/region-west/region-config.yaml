# Region-specific environment injection for all services — West
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-ingestion
spec:
  template:
    spec:
      containers:
      - name: data-ingestion
        env:
        - name: REGION
          value: "west"
