apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: threat-detection-production

namespace: threat-detection-prod

resources:
  - ../../base

patches:
  - path: replica-patch.yaml
  - path: resource-patch.yaml
  - path: security-patch.yaml

images:
  - name: threat-detection/data-ingestion
    newTag: "1.0.0"
  - name: threat-detection/stream-processing
    newTag: "1.0.0"

configMapGenerator:
  - name: threat-detection-config
    behavior: replace
    literals:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - ZOOKEEPER_CONNECT=zookeeper:2181