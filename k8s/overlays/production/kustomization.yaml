apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: threat-detection-production

namespace: threat-detection-prod

resources:
  - ../../base

patchesStrategicMerge:
  - replica-patch.yaml
  - resource-patch.yaml
  - security-patch.yaml

images:
  - name: threat-detection/data-ingestion-service
    newTag: "1.0.0"
  - name: threat-detection/stream-processing
    newTag: "1.0.0"

configMapGenerator:
  - name: threat-detection-config
    behavior: replace
    literals:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - ZOOKEEPER_CONNECT=zookeeper:2181