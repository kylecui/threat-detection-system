apiVersion: apps/v1
kind: Deployment
metadata:
  name: stream-processing-jobmanager
  namespace: threat-detection
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stream-processing
      component: jobmanager
  template:
    metadata:
      labels:
        app: stream-processing
        component: jobmanager
    spec:
      enableServiceLinks: false
      initContainers:
      - name: wait-for-kafka
        image: busybox:1.35
        imagePullPolicy: IfNotPresent
        command:
        - sh
        - -c
        - |
          echo "Waiting for Kafka to be ready..."
          until nc -z kafka 9092; do
            echo "Kafka not ready, retrying in 3s..."
            sleep 3
          done
          echo "Kafka is ready!"
      containers:
      - name: flink-jobmanager
        image: threat-detection/stream-processing:1.0
        imagePullPolicy: Never
        ports:
        - containerPort: 8081
          name: webui
        - containerPort: 6123
          name: rpc
        env:
        - name: FLINK_PROPERTIES
          value: |
            jobmanager.rpc.address: stream-processing-jobmanager
            jobmanager.rpc.port: 6123
            jobmanager.bind-host: 0.0.0.0
            parallelism.default: 1
            taskmanager.numberOfTaskSlots: 4
            rest.port: 8081
            rest.bind-address: 0.0.0.0
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka:9092"
        - name: INPUT_TOPIC
          value: "attack-events"
        - name: STATUS_TOPIC
          value: "status-events"
        - name: OUTPUT_TOPIC
          value: "threat-alerts"
        - name: AGGREGATION_TOPIC
          value: "minute-aggregations"
        command: ["/docker-entrypoint.sh"]
        args: ["standalone-job", "--job-classname", "com.threatdetection.stream.StreamProcessingJob"]
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /overview
            port: 8081
          initialDelaySeconds: 180
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /overview
            port: 8081
          initialDelaySeconds: 60
          periodSeconds: 10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stream-processing-taskmanager
  namespace: threat-detection
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stream-processing
      component: taskmanager
  template:
    metadata:
      labels:
        app: stream-processing
        component: taskmanager
    spec:
      enableServiceLinks: false
      initContainers:
      - name: wait-for-jobmanager
        image: busybox:1.35
        imagePullPolicy: IfNotPresent
        command:
        - sh
        - -c
        - |
          echo "Waiting for JobManager RPC to be ready..."
          until nc -z stream-processing-jobmanager 6123; do
            echo "JobManager not ready, retrying in 3s..."
            sleep 3
          done
          echo "JobManager is ready!"
      containers:
      - name: flink-taskmanager
        image: threat-detection/stream-processing:1.0
        imagePullPolicy: Never
        ports:
        - containerPort: 6122
          name: rpc
        env:
        - name: FLINK_PROPERTIES
          value: |
            jobmanager.rpc.address: stream-processing-jobmanager
            jobmanager.rpc.port: 6123
            taskmanager.numberOfTaskSlots: 4
            taskmanager.memory.process.size: 1728m
            taskmanager.bind-host: 0.0.0.0
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka:9092"
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        command: ["/docker-entrypoint.sh"]
        args: ["taskmanager"]
---
apiVersion: v1
kind: Service
metadata:
  name: stream-processing-jobmanager
  namespace: threat-detection
spec:
  selector:
    app: stream-processing
    component: jobmanager
  ports:
  - port: 6123
    targetPort: 6123
    name: rpc
  - port: 8081
    targetPort: 8081
    name: webui
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: stream-processing
  namespace: threat-detection
spec:
  selector:
    app: stream-processing
    component: jobmanager
  ports:
  - port: 8081
    targetPort: 8081
    name: webui
  type: ClusterIP
