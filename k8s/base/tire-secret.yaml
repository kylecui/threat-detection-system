---
# TIRE Secret - API keys and configuration
# Replace placeholder values with actual keys before deploying
# For keys you don't have, leave the placeholder — TIRE will skip that source
apiVersion: v1
kind: Secret
metadata:
  name: tire-secret
  labels:
    app: tire
type: Opaque
stringData:
  # Threat intelligence source API keys (optional — leave empty to skip source)
  ABUSEIPDB_API_KEY: ""
  OTX_API_KEY: ""
  GREYNOISE_API_KEY: ""
  VT_API_KEY: ""
  SHODAN_API_KEY: ""
  # LLM configuration for report generation (optional)
  LLM_API_KEY: ""
  LLM_MODEL: ""
  LLM_BASE_URL: ""
  # TIRE authentication
  ADMIN_PASSWORD: "tire-admin-2026"
  SESSION_SECRET_KEY: "tire-session-secret-key-change-me"
  TIRE_FERNET_KEY: ""
