---
# -----------------------------------------------------------------------------
# 7. Prometheus Scrape — prometheus may reach every pod on its metrics port.
#    Spring Boot services expose metrics on their main HTTP port (/actuator/prometheus).
#    ml-detection (Python/FastAPI) exposes on 8086; tire on 5000.
# -----------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
spec:
  podSelector: {}   # applies to ALL pods — prometheus scrapes everything
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: prometheus
      # Allow on all ports; each pod's scrape port differs and prometheus
      # is configured per-target.  Restricting here would require one policy
      # per service — this single policy keeps it maintainable.

---
# -----------------------------------------------------------------------------
# 8. DNS — all pods must be able to reach kube-dns (port 53 TCP + UDP).
#    Without this, service discovery breaks under a default-deny regime.
#    kube-dns lives in kube-system, so we use a namespaceSelector.
# -----------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
spec:
  podSelector: {}   # all pods in the namespace
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
