# =============================================================================
# Kubernetes NetworkPolicies for Threat Detection Platform
# Namespace: threat-detection
#
# Strategy: Default-deny ingress, then explicitly allow required traffic.
# Egress policies are intentionally omitted (ingress-only enforcement).
# =============================================================================

# -----------------------------------------------------------------------------
# 1. Default Deny — block all ingress to every pod in the namespace.
#    Every pod must have an explicit NetworkPolicy to receive traffic.
# -----------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
spec:
  podSelector: {}       # matches ALL pods in the namespace
  policyTypes:
    - Ingress
  # No ingress rules → deny everything by default

---
# -----------------------------------------------------------------------------
# 2. API Gateway — public entry point; accepts traffic from anywhere.
#    Clients outside the cluster reach it via NodePort / LoadBalancer / Ingress.
# -----------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-gateway-ingress
spec:
  podSelector:
    matchLabels:
      app: api-gateway
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 8888
          protocol: TCP

---
# -----------------------------------------------------------------------------
# 3. Data Ingestion — receives log/event data from:
#      • logstash  (port 8080)
#      • api-gateway (port 8080)
#      • emqx MQTT callbacks (port 8080)
# -----------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-data-ingestion-ingress
spec:
  podSelector:
    matchLabels:
      app: data-ingestion
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: logstash
      ports:
        - port: 8080
          protocol: TCP
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
      ports:
        - port: 8080
          protocol: TCP
    - from:
        - podSelector:
            matchLabels:
              app: emqx
      ports:
        - port: 8080
          protocol: TCP

---
# -----------------------------------------------------------------------------
# 4. Kafka — message broker; all application pods in the namespace may
#    produce/consume on port 9092.
# -----------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kafka-ingress
spec:
  podSelector:
    matchLabels:
      app: kafka
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}   # any pod in the namespace
      ports:
        - port: 9092
          protocol: TCP

---
# -----------------------------------------------------------------------------
# 5. PostgreSQL — database; only the services that need persistence may
#    connect on port 5432.  Includes the postgres-backup CronJob pod.
# -----------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-ingress
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: threat-assessment
        - podSelector:
            matchLabels:
              app: customer-management
        - podSelector:
            matchLabels:
              app: alert-management
        - podSelector:
            matchLabels:
              app: data-ingestion
        - podSelector:
            matchLabels:
              app: postgres-backup   # CronJob pods carry this label
      ports:
        - port: 5432
          protocol: TCP

---
