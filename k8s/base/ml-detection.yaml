---
apiVersion: v1
kind: Service
metadata:
  name: ml-detection
  namespace: threat-detection
  labels:
    app: ml-detection
spec:
  type: ClusterIP
  ports:
    - port: 8086
      targetPort: 8086
      protocol: TCP
      name: http
  selector:
    app: ml-detection

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-detection
  namespace: threat-detection
  labels:
    app: ml-detection
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ml-detection
  template:
    metadata:
      labels:
        app: ml-detection
    spec:
      initContainers:
      - name: wait-for-kafka
        image: busybox:1.35
        command:
        - sh
        - -c
        - |
          until nc -z kafka 9092; do
            echo "Waiting for Kafka..."
            sleep 2
          done
          echo "Kafka is ready!"
      containers:
      - name: ml-detection
        image: threat-detection/ml-detection:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8086
          name: http
          protocol: TCP
        env:
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka:29092"
        - name: KAFKA_CONSUMER_GROUP
          value: "ml-detection-group"
        - name: KAFKA_INPUT_TOPIC
          value: "attack-events"
        - name: KAFKA_OUTPUT_TOPIC
          value: "ml-threat-detections"
        - name: MODEL_PATH
          value: "/app/models"
        - name: LOG_LEVEL
          value: "INFO"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8086
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8086
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
