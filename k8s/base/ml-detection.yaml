---
apiVersion: v1
kind: Service
metadata:
  name: ml-detection
  labels:
    app: ml-detection
spec:
  type: ClusterIP
  ports:
    - port: 8086
      targetPort: 8086
      protocol: TCP
      name: http
  selector:
    app: ml-detection

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ml-models-pvc
  labels:
    app: ml-detection
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-detection
  labels:
    app: ml-detection
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ml-detection
  template:
    metadata:
      labels:
        app: ml-detection
    spec:
      enableServiceLinks: false
      initContainers:
      - name: wait-for-kafka
        image: busybox:1.35
        imagePullPolicy: IfNotPresent
        command:
        - sh
        - -c
        - |
          until nc -z kafka 9092; do
            echo "Waiting for Kafka..."
            sleep 2
          done
          echo "Kafka is ready!"
      containers:
      - name: ml-detection
        image: threat-detection/ml-detection:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8086
          name: http
          protocol: TCP
        env:
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka:9092"
        - name: KAFKA_CONSUMER_GROUP
          value: "ml-detection-group-v3"
        - name: KAFKA_INPUT_TOPIC
          value: "threat-alerts"
        - name: KAFKA_OUTPUT_TOPIC
          value: "ml-threat-detections"
        - name: MODEL_PATH
          value: "/app/models"
        - name: LOG_LEVEL
          value: "INFO"
        - name: BIGRU_ENABLED
          value: "true"
        - name: MODEL_WATCH_ENABLED
          value: "true"
        - name: POSTGRES_HOST
          value: "postgres"
        - name: POSTGRES_PORT
          value: "5432"
        - name: POSTGRES_DB
          value: "threat_detection"
        - name: POSTGRES_USER
          value: "threat_user"
        - name: POSTGRES_PASSWORD
          value: "threat_password"
        volumeMounts:
        - name: ml-models
          mountPath: /app/models
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8086
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8086
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
      - name: ml-models
        persistentVolumeClaim:
          claimName: ml-models-pvc
