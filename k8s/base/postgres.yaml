    GRANT USAGE, SELECT ON SEQUENCE device_status_history_id_seq TO threat_user;

  12-ip-segment-weights-v4.sql: |
    -- IP网段权重配置表 V4.0 - 双维度权重设计
    CREATE TABLE IF NOT EXISTS attack_source_weights (
        id SERIAL PRIMARY KEY,
        customer_id VARCHAR(50) NOT NULL,
        segment_name VARCHAR(255) NOT NULL,
        ip_range_start VARCHAR(15) NOT NULL,
        ip_range_end VARCHAR(15) NOT NULL,
        segment_type VARCHAR(50) NOT NULL,
        risk_level VARCHAR(20) NOT NULL,
        weight DECIMAL(3,2) NOT NULL DEFAULT 1.00,
        description TEXT,
        is_active BOOLEAN DEFAULT TRUE,
        priority INTEGER DEFAULT 50,
        created_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        CONSTRAINT uk_customer_source_segment UNIQUE (customer_id, segment_name)
    );

    CREATE INDEX IF NOT EXISTS idx_attack_source_customer_active ON attack_source_weights(customer_id, is_active) WHERE is_active = TRUE;
    CREATE INDEX IF NOT EXISTS idx_attack_source_ip_range ON attack_source_weights(customer_id, ip_range_start, ip_range_end);
    CREATE INDEX IF NOT EXISTS idx_attack_source_risk_level ON attack_source_weights(risk_level);

    CREATE TABLE IF NOT EXISTS honeypot_sensitivity_weights (
        id SERIAL PRIMARY KEY,
        customer_id VARCHAR(50) NOT NULL,
        honeypot_name VARCHAR(255) NOT NULL,
        ip_range_start VARCHAR(15) NOT NULL,
        ip_range_end VARCHAR(15) NOT NULL,
        honeypot_tier VARCHAR(50) NOT NULL,
        deployment_zone VARCHAR(50) NOT NULL,
        sensitivity_level VARCHAR(20) NOT NULL,
        weight DECIMAL(3,2) NOT NULL DEFAULT 1.00,
        simulated_service VARCHAR(100),
        attack_intent VARCHAR(100),
        description TEXT,
        is_active BOOLEAN DEFAULT TRUE,
        priority INTEGER DEFAULT 50,
        created_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        CONSTRAINT uk_customer_honeypot UNIQUE (customer_id, honeypot_name)
    );

    CREATE INDEX IF NOT EXISTS idx_honeypot_customer_active ON honeypot_sensitivity_weights(customer_id, is_active) WHERE is_active = TRUE;
    CREATE INDEX IF NOT EXISTS idx_honeypot_ip_range ON honeypot_sensitivity_weights(customer_id, ip_range_start, ip_range_end);
    CREATE INDEX IF NOT EXISTS idx_honeypot_sensitivity_level ON honeypot_sensitivity_weights(sensitivity_level);
