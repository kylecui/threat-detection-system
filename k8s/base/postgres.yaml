    CREATE OR REPLACE FUNCTION get_attack_source_weight(p_customer_id VARCHAR(50), p_attack_ip VARCHAR(15))
    RETURNS DECIMAL(3,2) AS $fn$
    DECLARE v_weight DECIMAL(3,2);
    BEGIN
        SELECT weight INTO v_weight FROM attack_source_weights
        WHERE customer_id = p_customer_id AND is_active = TRUE
          AND CAST(p_attack_ip AS inet) BETWEEN CAST(ip_range_start AS inet) AND CAST(ip_range_end AS inet)
        ORDER BY priority DESC, id DESC LIMIT 1;
        RETURN COALESCE(v_weight, 1.00);
    END;
    $fn$ LANGUAGE plpgsql;

    CREATE OR REPLACE FUNCTION get_honeypot_sensitivity_weight(p_customer_id VARCHAR(50), p_honeypot_ip VARCHAR(15))
    RETURNS DECIMAL(3,2) AS $fn$
    DECLARE v_weight DECIMAL(3,2);
    BEGIN
        SELECT weight INTO v_weight FROM honeypot_sensitivity_weights
        WHERE customer_id = p_customer_id AND is_active = TRUE
          AND CAST(p_honeypot_ip AS inet) BETWEEN CAST(ip_range_start AS inet) AND CAST(ip_range_end AS inet)
        ORDER BY priority DESC, id DESC LIMIT 1;
        RETURN COALESCE(v_weight, 1.00);
    END;
    $fn$ LANGUAGE plpgsql;

    CREATE OR REPLACE FUNCTION get_combined_segment_weight(p_customer_id VARCHAR(50), p_attack_ip VARCHAR(15), p_honeypot_ip VARCHAR(15))
    RETURNS TABLE(attack_source_weight DECIMAL(3,2), honeypot_sensitivity_weight DECIMAL(3,2), combined_weight DECIMAL(6,4)) AS $fn$
    DECLARE v_src DECIMAL(3,2); v_hp DECIMAL(3,2);
    BEGIN
        v_src := get_attack_source_weight(p_customer_id, p_attack_ip);
        v_hp := get_honeypot_sensitivity_weight(p_customer_id, p_honeypot_ip);
        RETURN QUERY SELECT v_src, v_hp, (v_src * v_hp)::DECIMAL(6,4);
    END;
    $fn$ LANGUAGE plpgsql;

  13-customer-port-weights.sql: |
    CREATE TABLE IF NOT EXISTS customer_port_weights (
        id SERIAL PRIMARY KEY,
        customer_id VARCHAR(50) NOT NULL,
        port_number INTEGER NOT NULL,
        port_name VARCHAR(100),
        weight DECIMAL(4,2) NOT NULL DEFAULT 1.0,
        risk_level VARCHAR(20) DEFAULT 'MEDIUM',
        attack_intent VARCHAR(200),
        description TEXT,
        priority INTEGER DEFAULT 0,
        enabled BOOLEAN DEFAULT TRUE,
        created_by VARCHAR(100),
        updated_by VARCHAR(100),
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        CONSTRAINT uk_customer_port UNIQUE(customer_id, port_number),
        CONSTRAINT ck_port_number CHECK (port_number >= 1 AND port_number <= 65535),
        CONSTRAINT ck_weight CHECK (weight >= 0.5 AND weight <= 10.0),
        CONSTRAINT ck_priority CHECK (priority >= 0 AND priority <= 100),
        CONSTRAINT ck_risk_level CHECK (risk_level IN ('LOW', 'MEDIUM', 'HIGH', 'CRITICAL'))
    );

    CREATE INDEX idx_customer_port_weights_customer ON customer_port_weights(customer_id);
    CREATE INDEX idx_customer_port_weights_port ON customer_port_weights(port_number);
    CREATE INDEX idx_customer_port_weights_enabled ON customer_port_weights(enabled);
    CREATE INDEX idx_customer_port_weights_composite ON customer_port_weights(customer_id, enabled, priority DESC);
    CREATE INDEX idx_customer_port_weights_risk ON customer_port_weights(risk_level);

    CREATE OR REPLACE FUNCTION update_customer_port_weights_timestamp() RETURNS TRIGGER AS $fn$
    BEGIN NEW.updated_at = CURRENT_TIMESTAMP; RETURN NEW; END;
    $fn$ LANGUAGE plpgsql;

    CREATE TRIGGER trg_customer_port_weights_updated BEFORE UPDATE ON customer_port_weights
    FOR EACH ROW EXECUTE FUNCTION update_customer_port_weights_timestamp();

    INSERT INTO customer_port_weights (customer_id, port_number, port_name, weight, risk_level, attack_intent, description, priority) VALUES
    ('test', 22, 'SSH', 10.0, 'CRITICAL', 'SSH远程控制', '测试客户SSH权重', 100),
    ('test', 3389, 'RDP', 10.0, 'CRITICAL', 'RDP远程桌面', '测试客户RDP权重', 100),
    ('test', 445, 'SMB', 9.5, 'CRITICAL', 'SMB横向移动', '测试客户SMB权重', 90),
    ('test', 3306, 'MySQL', 9.0, 'HIGH', 'MySQL数据库攻击', '测试客户MySQL权重', 85),
    ('test', 1433, 'SQL Server', 9.0, 'HIGH', 'SQL Server攻击', '测试客户SQL Server权重', 85),
    ('test', 80, 'HTTP', 6.0, 'MEDIUM', 'HTTP Web应用攻击', '测试客户HTTP权重', 60),
    ('test', 443, 'HTTPS', 6.0, 'MEDIUM', 'HTTPS Web应用攻击', '测试客户HTTPS权重', 60)
    ON CONFLICT (customer_id, port_number) DO NOTHING;

    CREATE OR REPLACE FUNCTION get_port_weight(p_customer_id VARCHAR(50), p_port_number INTEGER)
    RETURNS DECIMAL(4,2) AS $fn$
    DECLARE v_weight DECIMAL(4,2);
    BEGIN
        SELECT weight INTO v_weight FROM customer_port_weights WHERE customer_id = p_customer_id AND port_number = p_port_number AND enabled = TRUE LIMIT 1;
        IF v_weight IS NULL THEN
            SELECT risk_weight INTO v_weight FROM port_risk_configs WHERE port_number = p_port_number AND enabled = TRUE LIMIT 1;
        END IF;
        RETURN COALESCE(v_weight, 1.0);
    END;
    $fn$ LANGUAGE plpgsql;

    CREATE OR REPLACE FUNCTION get_port_weights_batch(p_customer_id VARCHAR(50), p_port_numbers INTEGER[])
    RETURNS TABLE(port_number INTEGER, weight DECIMAL(4,2), source TEXT) AS $fn$
    BEGIN
        RETURN QUERY
        WITH port_list AS (SELECT unnest(p_port_numbers) as port_num),
        customer_config AS (SELECT cpw.port_number, cpw.weight, 'CUSTOM'::TEXT as source FROM customer_port_weights cpw INNER JOIN port_list pl ON cpw.port_number = pl.port_num WHERE cpw.customer_id = p_customer_id AND cpw.enabled = TRUE),
        global_config AS (SELECT prc.port_number, prc.risk_weight as weight, COALESCE(prc.config_source, 'GLOBAL')::TEXT as source FROM port_risk_configs prc INNER JOIN port_list pl ON prc.port_number = pl.port_num LEFT JOIN customer_config cc ON prc.port_number = cc.port_number WHERE prc.enabled = TRUE AND cc.port_number IS NULL),
        default_config AS (SELECT pl.port_num as port_number, 1.0::DECIMAL(4,2) as weight, 'DEFAULT'::TEXT as source FROM port_list pl LEFT JOIN customer_config cc ON pl.port_num = cc.port_number LEFT JOIN global_config gc ON pl.port_num = gc.port_number WHERE cc.port_number IS NULL AND gc.port_number IS NULL)
        SELECT * FROM customer_config UNION ALL SELECT * FROM global_config UNION ALL SELECT * FROM default_config ORDER BY port_number;
    END;
    $fn$ LANGUAGE plpgsql;

  14-apt-temporal-accumulations.sql: |
    CREATE TABLE IF NOT EXISTS apt_temporal_accumulations (
        id BIGSERIAL PRIMARY KEY,
        customer_id VARCHAR(100) NOT NULL,
        attack_mac VARCHAR(17) NOT NULL,
        attack_ip VARCHAR(45),
        total_attack_count BIGINT NOT NULL DEFAULT 0,
        unique_ips_count INTEGER NOT NULL DEFAULT 0,
        unique_ports_count INTEGER NOT NULL DEFAULT 0,
        unique_devices_count INTEGER NOT NULL DEFAULT 0,
        decay_accumulated_score DECIMAL(12,4) NOT NULL DEFAULT 0.0,
        half_life_days INTEGER NOT NULL DEFAULT 30,
        inferred_attack_phase VARCHAR(30),
        phase_confidence DECIMAL(3,2),
        window_start TIMESTAMP WITH TIME ZONE NOT NULL,
        window_end TIMESTAMP WITH TIME ZONE NOT NULL,
        last_updated TIMESTAMP WITH TIME ZONE NOT NULL,
        cache_key VARCHAR(255),
        cache_expiry TIMESTAMP WITH TIME ZONE,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
        CONSTRAINT chk_attack_phase CHECK (inferred_attack_phase IN ('RECON', 'EXPLOITATION', 'PERSISTENCE', 'UNKNOWN')),
        CONSTRAINT chk_phase_confidence CHECK (phase_confidence >= 0.0 AND phase_confidence <= 1.0),
        CONSTRAINT chk_half_life CHECK (half_life_days > 0),
        CONSTRAINT chk_window_order CHECK (window_start <= window_end),
        CONSTRAINT uk_apt_temporal_customer_mac_window UNIQUE (customer_id, attack_mac, window_start)
    );

    CREATE INDEX IF NOT EXISTS idx_apt_temporal_customer_mac ON apt_temporal_accumulations(customer_id, attack_mac);
    CREATE INDEX IF NOT EXISTS idx_apt_temporal_attack_ip ON apt_temporal_accumulations(attack_ip) WHERE attack_ip IS NOT NULL;
    CREATE INDEX IF NOT EXISTS idx_apt_temporal_window ON apt_temporal_accumulations(window_start, window_end);
    CREATE INDEX IF NOT EXISTS idx_apt_temporal_phase ON apt_temporal_accumulations(inferred_attack_phase);
    CREATE INDEX IF NOT EXISTS idx_apt_temporal_updated ON apt_temporal_accumulations(last_updated DESC);
    CREATE INDEX IF NOT EXISTS idx_apt_temporal_cache ON apt_temporal_accumulations(cache_key) WHERE cache_key IS NOT NULL;
    CREATE INDEX IF NOT EXISTS idx_apt_temporal_customer_phase_time ON apt_temporal_accumulations(customer_id, inferred_attack_phase, last_updated DESC);
    CREATE INDEX IF NOT EXISTS idx_apt_temporal_score_threshold ON apt_temporal_accumulations(decay_accumulated_score DESC) WHERE decay_accumulated_score > 0;

    GRANT SELECT, INSERT, UPDATE, DELETE ON apt_temporal_accumulations TO threat_user;
    GRANT USAGE, SELECT ON SEQUENCE apt_temporal_accumulations_id_seq TO threat_user;

    CREATE OR REPLACE FUNCTION update_apt_temporal_updated_at() RETURNS TRIGGER AS $fn$
    BEGIN NEW.updated_at = CURRENT_TIMESTAMP; NEW.last_updated = CURRENT_TIMESTAMP; RETURN NEW; END;
    $fn$ LANGUAGE plpgsql;

    CREATE TRIGGER trigger_update_apt_temporal_updated_at BEFORE UPDATE ON apt_temporal_accumulations
    FOR EACH ROW EXECUTE FUNCTION update_apt_temporal_updated_at();

