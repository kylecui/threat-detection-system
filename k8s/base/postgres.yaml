    DO $$
    BEGIN
        IF EXISTS (SELECT 1 FROM information_schema.tables WHERE table_name = 'threat_assessments') THEN
            ALTER TABLE threat_assessments
            ADD COLUMN IF NOT EXISTS port_list TEXT,
            ADD COLUMN IF NOT EXISTS port_risk_score DECIMAL(10,2) DEFAULT 0.0,
            ADD COLUMN IF NOT EXISTS detection_tier INTEGER DEFAULT 2;
        END IF;
    END $$;

    DO $$
    BEGIN
        IF EXISTS (SELECT 1 FROM information_schema.tables WHERE table_name = 'threat_assessments') THEN
            CREATE INDEX IF NOT EXISTS idx_threat_assessments_composite
            ON threat_assessments(customer_id, attack_mac, assessment_time DESC);
            CREATE INDEX IF NOT EXISTS idx_threat_assessments_tier_level
            ON threat_assessments(detection_tier, threat_level);
        END IF;
    END $$;

    CREATE OR REPLACE VIEW v_port_risk_statistics AS
    SELECT
        risk_level, config_source,
        COUNT(*) as port_count,
        AVG(risk_weight) as avg_weight,
        MIN(risk_weight) as min_weight,
        MAX(risk_weight) as max_weight
    FROM port_risk_configs WHERE enabled = TRUE
    GROUP BY risk_level, config_source
    ORDER BY
        CASE risk_level WHEN 'CRITICAL' THEN 1 WHEN 'HIGH' THEN 2 WHEN 'MEDIUM' THEN 3 WHEN 'LOW' THEN 4 END,
        config_source;

  04-threat-assessment-tables.sql: |
    CREATE TABLE IF NOT EXISTS threat_assessments (
        id BIGSERIAL PRIMARY KEY,
        customer_id VARCHAR(100) NOT NULL,
        attack_mac VARCHAR(17) NOT NULL,
        threat_score DECIMAL(10,2) NOT NULL,
        threat_level VARCHAR(20) NOT NULL,
        attack_count INTEGER NOT NULL,
        unique_ips INTEGER NOT NULL,
        unique_ports INTEGER NOT NULL,
        unique_devices INTEGER NOT NULL,
        assessment_time TIMESTAMP WITH TIME ZONE NOT NULL,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
        port_list TEXT,
        port_risk_score DECIMAL(5,2) DEFAULT 0.0,
        detection_tier INTEGER DEFAULT 2,
        time_weight DECIMAL(5,2),
        ip_weight DECIMAL(5,2),
        port_weight DECIMAL(5,2),
        device_weight DECIMAL(5,2),
        attack_ip VARCHAR(45),
        mitigation_recommendations TEXT,
        mitigation_status VARCHAR(50),
        updated_at TIMESTAMP WITH TIME ZONE,
        CONSTRAINT chk_threat_level CHECK (threat_level IN ('CRITICAL', 'HIGH', 'MEDIUM', 'LOW', 'INFO')),
        CONSTRAINT chk_detection_tier CHECK (detection_tier IN (1, 2, 3)),
        CONSTRAINT chk_mitigation_status CHECK (mitigation_status IN ('PENDING', 'IN_PROGRESS', 'COMPLETED', 'FAILED'))
    );

    CREATE INDEX IF NOT EXISTS idx_threat_assessments_customer ON threat_assessments(customer_id);
    CREATE INDEX IF NOT EXISTS idx_threat_assessments_attack_mac ON threat_assessments(attack_mac);
    CREATE INDEX IF NOT EXISTS idx_threat_assessments_customer_mac ON threat_assessments(customer_id, attack_mac);
    CREATE INDEX IF NOT EXISTS idx_threat_assessments_assessment_time ON threat_assessments(assessment_time);
    CREATE INDEX IF NOT EXISTS idx_threat_assessments_threat_level ON threat_assessments(threat_level);
    CREATE INDEX IF NOT EXISTS idx_threat_assessments_attack_ip ON threat_assessments(attack_ip);
    CREATE INDEX IF NOT EXISTS idx_threat_assessments_mitigation_status ON threat_assessments(mitigation_status);

    GRANT SELECT, INSERT, UPDATE ON threat_assessments TO threat_user;
    GRANT USAGE, SELECT ON SEQUENCE threat_assessments_id_seq TO threat_user;

  05-alert-management-tables.sql: |
    CREATE TABLE IF NOT EXISTS alerts (
        id BIGSERIAL PRIMARY KEY,
        title VARCHAR(500) NOT NULL,
        description VARCHAR(2000),
        status VARCHAR(20) NOT NULL DEFAULT 'NEW',
        severity VARCHAR(20) NOT NULL,
        source VARCHAR(100) DEFAULT 'threat-detection-system',
        event_type VARCHAR(100),
        metadata TEXT,
        attack_mac VARCHAR(17),
        threat_score DOUBLE PRECISION,
        assigned_to VARCHAR(100),
        resolution VARCHAR(1000),
        resolved_by VARCHAR(100),
        resolved_at TIMESTAMP,
        last_notified_at TIMESTAMP,
        escalation_level INTEGER DEFAULT 0,
        escalation_reason VARCHAR(500),
        created_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP,
        CONSTRAINT chk_status CHECK (status IN ('NEW', 'ACKNOWLEDGED', 'IN_PROGRESS', 'RESOLVED', 'CLOSED', 'SUPPRESSED')),
        CONSTRAINT chk_severity CHECK (severity IN ('INFO', 'LOW', 'MEDIUM', 'HIGH', 'CRITICAL'))
    );

    CREATE INDEX IF NOT EXISTS idx_alerts_status ON alerts(status);
    CREATE INDEX IF NOT EXISTS idx_alerts_severity ON alerts(severity);
    CREATE INDEX IF NOT EXISTS idx_alerts_attack_mac ON alerts(attack_mac);
    CREATE INDEX IF NOT EXISTS idx_alerts_created_at ON alerts(created_at);
    CREATE INDEX IF NOT EXISTS idx_alerts_source ON alerts(source);

    CREATE TABLE IF NOT EXISTS alert_affected_assets (
        alert_id BIGINT NOT NULL REFERENCES alerts(id) ON DELETE CASCADE,
        asset VARCHAR(255) NOT NULL,
        PRIMARY KEY (alert_id, asset)
    );
    CREATE INDEX IF NOT EXISTS idx_alert_affected_assets_alert_id ON alert_affected_assets(alert_id);

    CREATE TABLE IF NOT EXISTS alert_recommendations (
        alert_id BIGINT NOT NULL REFERENCES alerts(id) ON DELETE CASCADE,
        recommendation VARCHAR(1000) NOT NULL,
        PRIMARY KEY (alert_id, recommendation)
    );
    CREATE INDEX IF NOT EXISTS idx_alert_recommendations_alert_id ON alert_recommendations(alert_id);

    CREATE TABLE IF NOT EXISTS notifications (
        id BIGSERIAL PRIMARY KEY,
        alert_id BIGINT REFERENCES alerts(id) ON DELETE CASCADE,
        channel VARCHAR(50) NOT NULL,
        recipient VARCHAR(255) NOT NULL,
        subject VARCHAR(1000),
        content TEXT,
        status VARCHAR(20) NOT NULL DEFAULT 'PENDING',
        error_message VARCHAR(500),
        retry_count INTEGER DEFAULT 0,
        max_retries INTEGER DEFAULT 3,
        sent_at TIMESTAMP,
        created_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP,
        CONSTRAINT chk_notification_channel CHECK (channel IN ('EMAIL', 'SMS', 'SLACK', 'WEBHOOK', 'TEAMS')),
        CONSTRAINT chk_notification_status CHECK (status IN ('PENDING', 'SENT', 'FAILED', 'RETRYING'))
    );

    CREATE INDEX IF NOT EXISTS idx_notifications_alert_id ON notifications(alert_id);
    CREATE INDEX IF NOT EXISTS idx_notifications_channel ON notifications(channel);
    CREATE INDEX IF NOT EXISTS idx_notifications_status ON notifications(status);
    CREATE INDEX IF NOT EXISTS idx_notifications_created_at ON notifications(created_at);

