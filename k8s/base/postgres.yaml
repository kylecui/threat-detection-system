    CREATE OR REPLACE FUNCTION get_customer_phase_ports(p_customer_id VARCHAR(50), p_phase VARCHAR(20))
    RETURNS TABLE(port_number INTEGER, port_name VARCHAR(100), priority INTEGER, description TEXT, source TEXT) AS $fn$
    BEGIN
        RETURN QUERY
        SELECT apc.port_number, apc.port_name, apc.priority, apc.description, 'CUSTOM'::TEXT as source
        FROM attack_phase_port_configs apc WHERE apc.customer_id = p_customer_id AND apc.phase = p_phase AND apc.enabled = TRUE
        UNION ALL
        SELECT apc.port_number, apc.port_name, apc.priority, apc.description, 'GLOBAL'::TEXT as source
        FROM attack_phase_port_configs apc WHERE apc.customer_id IS NULL AND apc.phase = p_phase AND apc.enabled = TRUE
          AND NOT EXISTS (SELECT 1 FROM attack_phase_port_configs custom WHERE custom.customer_id = p_customer_id AND custom.phase = p_phase AND custom.port_number = apc.port_number AND custom.enabled = TRUE)
        ORDER BY priority DESC, port_number;
    END;
    $fn$ LANGUAGE plpgsql;

    CREATE OR REPLACE FUNCTION is_port_in_customer_phase(p_customer_id VARCHAR(50), p_port_number INTEGER, p_phase VARCHAR(20))
    RETURNS BOOLEAN AS $fn$
    DECLARE v_count INTEGER;
    BEGIN
        SELECT COUNT(*) INTO v_count FROM attack_phase_port_configs WHERE customer_id = p_customer_id AND port_number = p_port_number AND phase = p_phase AND enabled = TRUE;
        IF v_count > 0 THEN RETURN TRUE; END IF;
        SELECT COUNT(*) INTO v_count FROM attack_phase_port_configs WHERE customer_id IS NULL AND port_number = p_port_number AND phase = p_phase AND enabled = TRUE;
        RETURN v_count > 0;
    END;
    $fn$ LANGUAGE plpgsql;

  16-temporal-device-mapping.sql: |
    -- Add temporal fields to device_customer_mapping for device circulation
    DO $fn$
    BEGIN
        IF NOT EXISTS (SELECT 1 FROM information_schema.columns
                       WHERE table_name = 'device_customer_mapping' AND column_name = 'bind_time') THEN
            ALTER TABLE device_customer_mapping
            ADD COLUMN bind_time TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP;
        END IF;
        IF NOT EXISTS (SELECT 1 FROM information_schema.columns
                       WHERE table_name = 'device_customer_mapping' AND column_name = 'unbind_time') THEN
            ALTER TABLE device_customer_mapping
            ADD COLUMN unbind_time TIMESTAMP WITH TIME ZONE;
        END IF;
        IF NOT EXISTS (SELECT 1 FROM information_schema.columns
                       WHERE table_name = 'device_customer_mapping' AND column_name = 'bind_reason') THEN
            ALTER TABLE device_customer_mapping
            ADD COLUMN bind_reason TEXT;
        END IF;
    END $fn$;

    DO $fn$
    BEGIN
        IF EXISTS (SELECT 1 FROM information_schema.table_constraints
                   WHERE table_name = 'device_customer_mapping'
                   AND constraint_name = 'device_customer_mapping_dev_serial_key') THEN
            ALTER TABLE device_customer_mapping
            DROP CONSTRAINT device_customer_mapping_dev_serial_key;
        END IF;
    END $fn$;

    DO $fn$
    BEGIN
        IF NOT EXISTS (SELECT 1 FROM pg_indexes WHERE indexname = 'idx_device_customer_mapping_bind_time') THEN
            CREATE INDEX idx_device_customer_mapping_bind_time ON device_customer_mapping(bind_time);
        END IF;
        IF NOT EXISTS (SELECT 1 FROM pg_indexes WHERE indexname = 'idx_device_customer_mapping_unbind_time') THEN
            CREATE INDEX idx_device_customer_mapping_unbind_time ON device_customer_mapping(unbind_time);
        END IF;
        IF NOT EXISTS (SELECT 1 FROM pg_indexes WHERE indexname = 'idx_device_customer_mapping_temporal_range') THEN
            CREATE INDEX idx_device_customer_mapping_temporal_range ON device_customer_mapping(dev_serial, bind_time, unbind_time);
        END IF;
    END $fn$;

    UPDATE device_customer_mapping SET bind_time = created_at WHERE bind_time IS NULL AND created_at IS NOT NULL;

