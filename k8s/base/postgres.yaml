---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-scripts
  namespace: threat-detection
data:
  01-init-db.sql: |
    -- 数据库初始化脚本
    -- customers schema must match Customer.java JPA entity (id BIGSERIAL PK, customer_id UNIQUE)
    CREATE TABLE IF NOT EXISTS customers (
        id BIGSERIAL PRIMARY KEY,
        customer_id VARCHAR(100) NOT NULL UNIQUE,
        name VARCHAR(200) NOT NULL,
        email VARCHAR(255) NOT NULL,
        phone VARCHAR(50),
        address VARCHAR(500),
        status VARCHAR(20) NOT NULL DEFAULT 'ACTIVE',
        subscription_tier VARCHAR(20) NOT NULL DEFAULT 'BASIC',
        max_devices INTEGER NOT NULL DEFAULT 10,
        current_devices INTEGER NOT NULL DEFAULT 0,
        description VARCHAR(1000),
        created_at TIMESTAMP WITH TIME ZONE NOT NULL DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP WITH TIME ZONE NOT NULL DEFAULT CURRENT_TIMESTAMP,
        created_by VARCHAR(100) DEFAULT 'system',
        updated_by VARCHAR(100) DEFAULT 'system',
        subscription_start_date TIMESTAMP WITH TIME ZONE,
        subscription_end_date TIMESTAMP WITH TIME ZONE,
        alert_enabled BOOLEAN DEFAULT TRUE
    );

    CREATE INDEX IF NOT EXISTS idx_customer_id ON customers(customer_id);
    CREATE INDEX IF NOT EXISTS idx_customer_email ON customers(email);
    CREATE INDEX IF NOT EXISTS idx_customer_status ON customers(status);

    GRANT SELECT, INSERT, UPDATE, DELETE ON customers TO threat_user;
    GRANT USAGE, SELECT ON SEQUENCE customers_id_seq TO threat_user;

    CREATE TABLE IF NOT EXISTS device_customer_mapping (
        id SERIAL PRIMARY KEY,
        dev_serial VARCHAR(100) NOT NULL UNIQUE,
        customer_id VARCHAR(100) NOT NULL,
        device_name VARCHAR(200),
        is_active BOOLEAN NOT NULL DEFAULT true,
        created_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP,
        FOREIGN KEY (customer_id) REFERENCES customers(customer_id) ON DELETE CASCADE
    );

    CREATE INDEX IF NOT EXISTS idx_device_serial ON device_customer_mapping(dev_serial);
    CREATE INDEX IF NOT EXISTS idx_device_customer_id ON device_customer_mapping(customer_id);

  02-attack-events-storage.sql: |
    -- ============================================================================
    -- 原始攻击事件存储表 (用于追溯和审计)
    -- ============================================================================
    CREATE TABLE IF NOT EXISTS attack_events (
        id BIGINT GENERATED ALWAYS AS IDENTITY PRIMARY KEY,
        customer_id VARCHAR(100) NOT NULL,
        dev_serial VARCHAR(50) NOT NULL,
        attack_mac VARCHAR(17) NOT NULL,
        attack_ip VARCHAR(45),
        response_ip VARCHAR(45) NOT NULL,
        response_port INTEGER NOT NULL,
        event_timestamp TIMESTAMP WITH TIME ZONE NOT NULL,
        log_time BIGINT,
        received_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
        raw_log_data JSONB,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    CREATE INDEX IF NOT EXISTS idx_attack_events_customer ON attack_events(customer_id);
    CREATE INDEX IF NOT EXISTS idx_attack_events_attack_mac ON attack_events(attack_mac);
    CREATE INDEX IF NOT EXISTS idx_attack_events_timestamp ON attack_events(event_timestamp DESC);
    CREATE INDEX IF NOT EXISTS idx_attack_events_customer_mac ON attack_events(customer_id, attack_mac);
    CREATE INDEX IF NOT EXISTS idx_attack_events_customer_time ON attack_events(customer_id, event_timestamp DESC);
    CREATE INDEX IF NOT EXISTS idx_attack_events_response_port ON attack_events(response_port);
    CREATE INDEX IF NOT EXISTS idx_attack_events_raw_log ON attack_events USING GIN (raw_log_data);

    COMMENT ON TABLE attack_events IS '原始攻击事件存储 - 所有蜜罐检测到的探测行为';

    CREATE TABLE IF NOT EXISTS threat_alerts (
        id BIGINT GENERATED ALWAYS AS IDENTITY PRIMARY KEY,
        customer_id VARCHAR(100) NOT NULL,
        attack_mac VARCHAR(17) NOT NULL,
        threat_score DECIMAL(12,2) NOT NULL,
        threat_level VARCHAR(20) NOT NULL CHECK (threat_level IN ('CRITICAL', 'HIGH', 'MEDIUM', 'LOW', 'INFO')),
        attack_count INTEGER NOT NULL,
        unique_ips INTEGER NOT NULL,
        unique_ports INTEGER NOT NULL,
        unique_devices INTEGER NOT NULL,
        mixed_port_weight DECIMAL(10,2),
        tier INTEGER NOT NULL CHECK (tier IN (1, 2, 3)),
        window_type VARCHAR(50),
        window_start TIMESTAMP WITH TIME ZONE NOT NULL,
        window_end TIMESTAMP WITH TIME ZONE NOT NULL,
        alert_timestamp TIMESTAMP WITH TIME ZONE NOT NULL,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
        status VARCHAR(20) DEFAULT 'NEW' CHECK (status IN ('NEW', 'REVIEWED', 'RESOLVED', 'FALSE_POSITIVE')),
        reviewed_by VARCHAR(100),
        reviewed_at TIMESTAMP WITH TIME ZONE,
        notes TEXT,
        raw_alert_data JSONB
    );

    CREATE INDEX IF NOT EXISTS idx_threat_alerts_customer ON threat_alerts(customer_id);
    CREATE INDEX IF NOT EXISTS idx_threat_alerts_mac ON threat_alerts(attack_mac);
    CREATE INDEX IF NOT EXISTS idx_threat_alerts_level ON threat_alerts(threat_level);
    CREATE INDEX IF NOT EXISTS idx_threat_alerts_tier ON threat_alerts(tier);
    CREATE INDEX IF NOT EXISTS idx_threat_alerts_timestamp ON threat_alerts(alert_timestamp DESC);
    CREATE INDEX IF NOT EXISTS idx_threat_alerts_status ON threat_alerts(status);
    CREATE INDEX IF NOT EXISTS idx_threat_alerts_customer_time ON threat_alerts(customer_id, alert_timestamp DESC);
    CREATE INDEX IF NOT EXISTS idx_threat_alerts_customer_mac_time ON threat_alerts(customer_id, attack_mac, alert_timestamp DESC);
    CREATE INDEX IF NOT EXISTS idx_threat_alerts_raw_data ON threat_alerts USING GIN (raw_alert_data);

    GRANT SELECT, INSERT, UPDATE ON attack_events TO threat_user;
    GRANT USAGE, SELECT ON SEQUENCE attack_events_id_seq TO threat_user;
    GRANT SELECT, INSERT, UPDATE ON threat_alerts TO threat_user;
    GRANT USAGE, SELECT ON SEQUENCE threat_alerts_id_seq TO threat_user;

    CREATE OR REPLACE VIEW v_recent_alerts AS
    SELECT
        ta.id, ta.customer_id, ta.attack_mac, ta.threat_score, ta.threat_level,
        ta.attack_count, ta.unique_ips, ta.unique_ports, ta.tier, ta.window_type,
        ta.alert_timestamp, ta.status,
        (SELECT MIN(event_timestamp) FROM attack_events ae
         WHERE ae.customer_id = ta.customer_id AND ae.attack_mac = ta.attack_mac
           AND ae.event_timestamp >= ta.window_start AND ae.event_timestamp < ta.window_end
        ) as first_attack_time,
        (SELECT COUNT(*) FROM attack_events ae
         WHERE ae.customer_id = ta.customer_id AND ae.attack_mac = ta.attack_mac
           AND ae.event_timestamp >= ta.window_start AND ae.event_timestamp < ta.window_end
        ) as total_events
    FROM threat_alerts ta
    WHERE ta.alert_timestamp >= NOW() - INTERVAL '7 days'
    ORDER BY ta.alert_timestamp DESC;

    CREATE OR REPLACE VIEW v_customer_alert_summary AS
    SELECT
        customer_id,
        COUNT(*) as total_alerts,
        COUNT(DISTINCT attack_mac) as unique_attackers,
        SUM(CASE WHEN threat_level = 'CRITICAL' THEN 1 ELSE 0 END) as critical_alerts,
        SUM(CASE WHEN threat_level = 'HIGH' THEN 1 ELSE 0 END) as high_alerts,
        SUM(CASE WHEN threat_level = 'MEDIUM' THEN 1 ELSE 0 END) as medium_alerts,
        SUM(CASE WHEN threat_level = 'LOW' THEN 1 ELSE 0 END) as low_alerts,
        MAX(alert_timestamp) as last_alert_time,
        COUNT(CASE WHEN status = 'NEW' THEN 1 END) as pending_review
    FROM threat_alerts
    WHERE alert_timestamp >= NOW() - INTERVAL '30 days'
    GROUP BY customer_id;

    GRANT SELECT ON v_recent_alerts TO threat_user;
    GRANT SELECT ON v_customer_alert_summary TO threat_user;

  03-port-weights.sql: |
    -- 端口权重配置
    CREATE TABLE IF NOT EXISTS port_risk_configs (
        id SERIAL PRIMARY KEY,
        port_number INTEGER NOT NULL,
        port_name VARCHAR(100) NOT NULL,
        risk_level VARCHAR(20) NOT NULL DEFAULT 'MEDIUM',
        risk_weight DECIMAL(4,2) NOT NULL DEFAULT 1.0,
        attack_intent VARCHAR(200),
        config_source VARCHAR(20) DEFAULT 'LEGACY',
        enabled BOOLEAN DEFAULT TRUE,
        description TEXT,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        UNIQUE(port_number),
        CHECK (port_number >= 1 AND port_number <= 65535),
        CHECK (risk_weight >= 1.0 AND risk_weight <= 10.0),
        CHECK (risk_level IN ('LOW', 'MEDIUM', 'HIGH', 'CRITICAL')),
        CHECK (config_source IN ('CVSS', 'LEGACY', 'CUSTOM'))
    );

    CREATE INDEX idx_port_risk_configs_port ON port_risk_configs(port_number);
    CREATE INDEX idx_port_risk_configs_risk_level ON port_risk_configs(risk_level);
    CREATE INDEX idx_port_risk_configs_enabled ON port_risk_configs(enabled);

