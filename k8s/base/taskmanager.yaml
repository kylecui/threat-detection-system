---
apiVersion: v1
kind: Service
metadata:
  name: taskmanager
  namespace: threat-detection
  labels:
    app: taskmanager
    component: stream-processing
spec:
  clusterIP: None  # Headless service for TaskManager
  selector:
    app: taskmanager
  ports:
  - name: rpc
    port: 6122
    targetPort: 6122
  - name: metrics
    port: 9249
    targetPort: 9249

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskmanager
  namespace: threat-detection
  labels:
    app: taskmanager
    component: stream-processing
spec:
  replicas: 2
  selector:
    matchLabels:
      app: taskmanager
  template:
    metadata:
      labels:
        app: taskmanager
        component: stream-processing
    spec:
      initContainers:
      # 等待JobManager (stream-processing)启动
      - name: wait-for-jobmanager
        image: busybox:1.35
        imagePullPolicy: IfNotPresent
        command:
        - sh
        - -c
        - |
          until nc -z stream-processing 6123; do
            echo "Waiting for JobManager (stream-processing:6123)..."
            sleep 2
          done
          echo "JobManager is ready!"
      
      # 等待Kafka启动
      - name: wait-for-kafka
        image: busybox:1.35
        imagePullPolicy: IfNotPresent
        command:
        - sh
        - -c
        - |
          until nc -z kafka 9092; do
            echo "Waiting for Kafka..."
            sleep 2
          done
          echo "Kafka is ready!"
      
      containers:
      - name: taskmanager
        image: flink:1.17-scala_2.12-java11
        imagePullPolicy: IfNotPresent
        command:
        - /bin/bash
        - -c
        - |
          # 等待JobManager完全就绪
          sleep 10
          
          # 启动TaskManager
          exec /docker-entrypoint.sh taskmanager
        
        env:
        # JobManager地址
        - name: JOB_MANAGER_RPC_ADDRESS
          value: "stream-processing"
        
        # TaskManager配置
        - name: TASK_MANAGER_NUMBER_OF_TASK_SLOTS
          value: "4"  # 每个TaskManager 4个slot
        
        - name: TASK_MANAGER_MEMORY_PROCESS_SIZE
          value: "1728m"  # 总内存
        
        - name: TASK_MANAGER_MEMORY_FRAMEWORK_HEAP_SIZE
          value: "128m"
        
        - name: TASK_MANAGER_MEMORY_TASK_HEAP_SIZE
          value: "512m"
        
        - name: TASK_MANAGER_MEMORY_MANAGED_SIZE
          value: "512m"
        
        # Kafka配置
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka:9092"
        
        # 并行度
        - name: PARALLELISM_DEFAULT
          value: "4"
        
        # Checkpoint配置
        - name: STATE_BACKEND
          value: "rocksdb"
        
        - name: CHECKPOINTING_INTERVAL
          value: "60000"  # 60秒
        
        # JVM配置
        - name: FLINK_ENV_JAVA_OPTS
          value: "-Xms512m -Xmx1024m -XX:+UseG1GC"
        
        ports:
        - name: rpc
          containerPort: 6122
        - name: metrics
          containerPort: 9249
        
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        
        livenessProbe:
          tcpSocket:
            port: 6122
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          tcpSocket:
            port: 6122
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        
        volumeMounts:
        # Flink配置目录
        - name: flink-config
          mountPath: /opt/flink/conf/flink-conf.yaml
          subPath: flink-conf.yaml
        
        # 临时目录
        - name: tmp
          mountPath: /tmp
      
      volumes:
      # Flink配置
      - name: flink-config
        configMap:
          name: flink-config
      
      # 临时目录
      - name: tmp
        emptyDir: {}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: flink-config
  namespace: threat-detection
data:
  flink-conf.yaml: |
    # JobManager配置
    jobmanager.rpc.address: stream-processing
    jobmanager.rpc.port: 6123
    jobmanager.bind-host: 0.0.0.0
    
    # TaskManager配置
    taskmanager.host: 0.0.0.0
    taskmanager.rpc.port: 6122
    taskmanager.bind-host: 0.0.0.0
    taskmanager.numberOfTaskSlots: 4
    
    # 内存配置
    taskmanager.memory.process.size: 1728m
    taskmanager.memory.framework.heap.size: 128m
    taskmanager.memory.task.heap.size: 512m
    taskmanager.memory.managed.size: 512m
    
    # 并行度
    parallelism.default: 4
    
    # Checkpoint配置
    state.backend: rocksdb
    state.checkpoints.dir: file:///tmp/flink-checkpoints
    state.savepoints.dir: file:///tmp/flink-savepoints
    execution.checkpointing.interval: 60s
    execution.checkpointing.mode: EXACTLY_ONCE
    execution.checkpointing.timeout: 10min
    execution.checkpointing.max-concurrent-checkpoints: 1
    
    # 高可用配置 (可选,生产环境建议启用)
    # high-availability: zookeeper
    # high-availability.zookeeper.quorum: zookeeper:2181
    # high-availability.storageDir: file:///tmp/flink-ha
    
    # 重启策略
    restart-strategy: fixed-delay
    restart-strategy.fixed-delay.attempts: 3
    restart-strategy.fixed-delay.delay: 10s
    
    # Metrics配置
    metrics.reporters: prom
    metrics.reporter.prom.class: org.apache.flink.metrics.prometheus.PrometheusReporter
    metrics.reporter.prom.port: 9249
    
    # 日志配置
    env.log.level: INFO
    env.log.max: 10
