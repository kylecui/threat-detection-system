apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
data:
  alerts.yml: |
    groups:
      - name: threat-detection-alerts
        rules:
          - alert: ServiceDown
            expr: up == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Service down"
              description: "Target {{ $labels.instance }} in job {{ $labels.job }} has been down for more than 2 minutes"

          - alert: HighErrorRate
            expr: |
              (
                sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m])) by (job)
                /
                sum(rate(http_server_requests_seconds_count[5m])) by (job)
              ) > 0.05
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High HTTP 5xx error rate"
              description: "Job {{ $labels.job }} has HTTP 5xx error rate > 5% for 5 minutes"

          - alert: KafkaConsumerLag
            expr: kafka_consumergroup_lag_sum > 10000
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Kafka consumer lag high"
              description: "Kafka consumer lag is above 10000 for more than 10 minutes"

          - alert: HighMemoryUsage
            expr: |
              (
                jvm_memory_used_bytes{area="heap"}
                /
                jvm_memory_max_bytes{area="heap"}
              ) > 0.8
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "High JVM heap usage"
              description: "JVM heap usage is above 80% for {{ $labels.job }}"

          - alert: ThreatDetectionPipelineStalled
            expr: increase(threat_alerts_total[15m]) == 0
            for: 15m
            labels:
              severity: critical
            annotations:
              summary: "Threat detection pipeline stalled"
              description: "No new threat alerts were generated in the last 15 minutes"
