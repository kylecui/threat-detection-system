apiVersion: v1
kind: Service
metadata:
  name: emqx
  labels:
    app: emqx
spec:
  ports:
    - name: mqtt
      port: 1883
      targetPort: 1883
    - name: mqtt-tls
      port: 8883
      targetPort: 8883
    - name: mqtt-ws
      port: 8083
      targetPort: 8083
    - name: dashboard
      port: 18083
      targetPort: 18083
  selector:
    app: emqx
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: emqx
  labels:
    app: emqx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: emqx
  template:
    metadata:
      labels:
        app: emqx
    spec:
      containers:
        - name: emqx
          image: emqx/emqx:5.5.1
          ports:
            - containerPort: 1883
            - containerPort: 8883
            - containerPort: 8083
            - containerPort: 18083
          env:
            - name: EMQX_NAME
              value: "threat-detection-emqx"
            - name: EMQX_ALLOW_ANONYMOUS
              value: "true"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          readinessProbe:
            exec:
              command: ["emqx", "ctl", "status"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 6
          livenessProbe:
            exec:
              command: ["emqx", "ctl", "status"]
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: emqx-data
              mountPath: /opt/emqx/data
      volumes:
        - name: emqx-data
          emptyDir: {}
