# Kafka MirrorMaker 2 — Cross-Region Topic Replication
# Replicates attack-events, threat-alerts, ml-threat-detections across regions
# Deploy one MM2 instance per target region
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-mirrormaker-config
  namespace: threat-detection
data:
  mm2.properties: |
    # MirrorMaker 2 Configuration
    # Source and target clusters are configured per-region via overlay env vars

    # Cluster aliases
    clusters = source, local
    source.bootstrap.servers = ${SOURCE_KAFKA_BOOTSTRAP:kafka:29092}
    local.bootstrap.servers = kafka:29092

    # Replication flows: source -> local
    source->local.enabled = true
    source->local.topics = attack-events,threat-alerts,ml-threat-detections,status-events

    # Do NOT replicate internal topics
    source->local.topics.exclude = .*internal.*,__.*

    # Replication settings
    replication.factor = 1
    offset-syncs.topic.replication.factor = 1
    heartbeats.topic.replication.factor = 1
    checkpoints.topic.replication.factor = 1

    # Consumer settings
    source.consumer.group.id = mirrormaker2-group
    source.consumer.auto.offset.reset = latest

    # Sync settings
    sync.topic.acls.enabled = false
    sync.topic.configs.enabled = true
    refresh.topics.interval.seconds = 30
    refresh.groups.interval.seconds = 30

    # Emit heartbeats
    emit.heartbeats.enabled = true
    emit.heartbeats.interval.seconds = 10

    # Checkpoints (consumer offset sync)
    emit.checkpoints.enabled = true
    emit.checkpoints.interval.seconds = 30

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-mirrormaker
  namespace: threat-detection
  labels:
    app: kafka-mirrormaker
    component: cross-region-replication
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-mirrormaker
  template:
    metadata:
      labels:
        app: kafka-mirrormaker
        component: cross-region-replication
    spec:
      initContainers:
      - name: wait-for-kafka
        image: busybox:1.35
        command:
        - sh
        - -c
        - |
          until nc -z kafka 9092; do
            echo "Waiting for local Kafka..."
            sleep 2
          done
          echo "Local Kafka is ready!"
      containers:
      - name: mirrormaker
        image: confluentinc/cp-kafka:7.4.0
        command:
        - /bin/bash
        - -c
        - |
          echo "Starting Kafka MirrorMaker 2..."
          # Only start if SOURCE_KAFKA_BOOTSTRAP is configured (cross-region mode)
          if [ -z "$SOURCE_KAFKA_BOOTSTRAP" ] || [ "$SOURCE_KAFKA_BOOTSTRAP" = "kafka:29092" ]; then
            echo "No remote source configured (SOURCE_KAFKA_BOOTSTRAP=$SOURCE_KAFKA_BOOTSTRAP). MM2 idle."
            # Keep container alive for health checks but do nothing
            while true; do sleep 3600; done
          fi
          # Replace env vars in config
          sed "s|\${SOURCE_KAFKA_BOOTSTRAP:kafka:29092}|${SOURCE_KAFKA_BOOTSTRAP}|g" \
            /etc/mirrormaker/mm2.properties > /tmp/mm2.properties
          # Start Connect-based MirrorMaker 2
          connect-mirror-maker /tmp/mm2.properties
        env:
        - name: SOURCE_KAFKA_BOOTSTRAP
          value: "kafka:29092"  # Override in region overlays to point to remote Kafka
        - name: REGION
          value: "east"
        - name: KAFKA_HEAP_OPTS
          value: "-Xmx512m -Xms256m"
        volumeMounts:
        - name: config
          mountPath: /etc/mirrormaker
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - /bin/bash
            - -c
            - "ps aux | grep -v grep | grep -q java || true"
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
        readinessProbe:
          exec:
            command:
            - /bin/bash
            - -c
            - "ps aux | grep -v grep | grep -q java || true"
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - name: config
        configMap:
          name: kafka-mirrormaker-config
