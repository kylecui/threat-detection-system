---
apiVersion: v1
kind: ConfigMap
metadata:
  name: logstash-config
  namespace: threat-detection
data:
  logstash.yml: |
    http.host: "0.0.0.0"
    path.config: /usr/share/logstash/pipeline
    pipeline.workers: 4
    pipeline.batch.size: 125
    pipeline.batch.delay: 50
    queue.type: persisted
    queue.max_bytes: 1gb
    log.level: info
    
  attack-events.conf: |
    # Logstash Pipeline配置 - 威胁检测系统 (K8s)
    # 接收rsyslog日志，基础解析后通过HTTP发送到data-ingestion服务
    # data-ingestion负责customerId解析、业务验证、Kafka发布
    # 参考: infrastructure/logging/logstash/pipeline/attack-events-optimized.conf
    
    input {
      tcp {
        port => 9080
        codec => plain
        type => "syslog-raw"
        tags => ["rsyslog"]
      }
    }
    
    filter {
      # 阶段1: 基础KV解析 (保留原始message字段供data-ingestion使用)
      if [type] == "syslog-raw" {
        kv {
          source => "message"
          field_split => ","
          value_split => "="
          trim_key => " "
          trim_value => " "
        }
        # NOTE: 不删除message字段 — data-ingestion需要它来解析和验证
      }
      
      # 阶段2: 轻量级标签分类 (保持snake_case，不做camelCase转换)
      
      # 攻击日志处理 (log_type=1)
      if [log_type] == "1" {
        mutate {
          add_tag => ["attack-log"]
        }
        
        if [log_time] {
          date {
            match => ["log_time", "UNIX"]
            target => "@timestamp"
          }
          ruby {
            code => "event.set('timestamp', Time.at(event.get('log_time').to_i).utc.iso8601)"
          }
        }
        
        if [attack_mac] {
          mutate {
            uppercase => ["attack_mac"]
            gsub => ["attack_mac", "-", ":"]
          }
        }
        
        mutate {
          convert => {
            "response_port" => "integer"
            "log_time" => "integer"
            "sub_type" => "integer"
            "line_id" => "integer"
            "Iface_type" => "integer"
            "Vlan_id" => "integer"
          }
        }
      }
      
      # 心跳日志处理 (log_type=2)
      else if [log_type] == "2" {
        mutate {
          add_tag => ["heartbeat-log"]
        }
        
        if [time] {
          date {
            match => ["time", "yyyy-MM-dd HH:mm:ss"]
            target => "@timestamp"
          }
        }
        
        mutate {
          convert => {
            "sentry_count" => "integer"
            "real_host_count" => "integer"
            "dev_start_time" => "integer"
            "dev_end_time" => "integer"
          }
        }
      }
      
      # 添加处理时间戳
      ruby {
        code => "event.set('logstash_processed_at', Time.now.utc.iso8601)"
      }
    }
    
    output {
      # 有效日志 → HTTP到data-ingestion服务 (customerId解析 + Kafka发布)
      if ("attack-log" in [tags] or "heartbeat-log" in [tags]) {
        http {
          url => "http://data-ingestion:8080/api/v1/logs/ingest"
          http_method => "post"
          format => "json"
          content_type => "application/json"
          retry_failed => true
          socket_timeout => 30
          connect_timeout => 10
        }
      }
      
      # 备用文件输出 (如果HTTP失败，用于排查)
      if ("attack-log" in [tags] or "heartbeat-log" in [tags]) {
        file {
          path => "/tmp/production_test_logs/http_output_%{+YYYY-MM-dd}.log"
          codec => json_lines
        }
      }
    }

---
apiVersion: v1
kind: Service
metadata:
  name: logstash
  namespace: threat-detection
  labels:
    app: logstash
spec:
  type: LoadBalancer
  ports:
    - port: 9080
      targetPort: 9080
      protocol: TCP
      name: rsyslog-tcp
    - port: 9600
      targetPort: 9600
      protocol: TCP
      name: monitoring
  selector:
    app: logstash

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logstash
  namespace: threat-detection
  labels:
    app: logstash
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logstash
  template:
    metadata:
      labels:
        app: logstash
    spec:
      enableServiceLinks: false
      initContainers:
      - name: wait-for-kafka
        image: busybox:1.35
        imagePullPolicy: IfNotPresent
        command:
        - sh
        - -c
        - |
          until nc -z kafka 9092; do
            echo "Waiting for Kafka..."
            sleep 2
          done
          echo "Kafka is ready!"
      - name: wait-for-data-ingestion
        image: busybox:1.35
        imagePullPolicy: IfNotPresent
        command:
        - sh
        - -c
        - |
          echo "Waiting for data-ingestion service..."
          until nc -z data-ingestion 8080; do
            echo "data-ingestion not ready, retrying in 3s..."
            sleep 3
          done
          echo "data-ingestion is ready!"
      containers:
      - name: logstash
        image: docker.elastic.co/logstash/logstash:8.11.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 9080
          name: rsyslog-tcp
          protocol: TCP
        - containerPort: 9600
          name: monitoring
          protocol: TCP
        env:
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka:9092"
        - name: LS_JAVA_OPTS
          value: "-Xmx512m -Xms512m"
        volumeMounts:
        - name: config
          mountPath: /usr/share/logstash/config/logstash.yml
          subPath: logstash.yml
        - name: pipeline
          mountPath: /usr/share/logstash/pipeline/attack-events.conf
          subPath: attack-events.conf
        - name: logs
          mountPath: /tmp/production_test_logs
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /_node/stats
            port: 9600
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /_node/stats
            port: 9600
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
      - name: config
        configMap:
          name: logstash-config
          items:
          - key: logstash.yml
            path: logstash.yml
      - name: pipeline
        configMap:
          name: logstash-config
          items:
          - key: attack-events.conf
            path: attack-events.conf
      - name: logs
        emptyDir: {}
