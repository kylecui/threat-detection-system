apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: threat-detection-base

namespace: threat-detection

resources:
  - namespace.yaml
  - postgres.yaml
  - redis.yaml
  - zookeeper.yaml
  - kafka.yaml
  - kafka-topic-init.yaml
  - logstash.yaml
  - emqx.yaml
  - config-server.yaml
  - data-ingestion.yaml
  - stream-processing.yaml
  # taskmanager.yaml removed — stream-processing.yaml already includes TaskManager
  # with our custom image containing the application JAR
  - customer-management.yaml
  - threat-assessment.yaml
  - alert-management.yaml
  - threat-intelligence.yaml
  - ml-detection.yaml
  - api-gateway.yaml
  - tire.yaml
  - tire-secret.yaml
  - postgres-schema-apply.yaml
  # Multi-region resources (enable in region overlays):
  # - kafka-mirrormaker.yaml
  # - postgres-replication.yaml

images:
  - name: threat-detection/data-ingestion
    newTag: latest
  - name: threat-detection/stream-processing
    newTag: "1.0"
  - name: threat-detection/api-gateway
    newTag: latest
  - name: threat-detection/config-server
    newTag: latest
  - name: threat-detection/customer-management
    newTag: latest
  - name: threat-detection/alert-management
    newTag: latest
  - name: threat-detection/threat-assessment
    newTag: latest
  - name: threat-detection/threat-intelligence
    newTag: latest
  - name: threat-detection/ml-detection
    newTag: latest
  - name: threat-detection/tire
    newTag: latest

configMapGenerator:
  - name: threat-detection-config
    literals:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - ZOOKEEPER_CONNECT=zookeeper:2181
      - LOG_LEVEL=INFO
