# Logstash Pipeline配置 - 威胁检测系统 (优化版)
# 接收rsyslog日志，基础解析后通过HTTP发送到data-ingestion服务
# 移除冗余验证逻辑，专注于ETL，业务逻辑由data-ingestion处理
#
# 日志格式参考: docs/api/data_ingestion_api.md
#
# 攻击日志示例 (log_type=1):
# syslog_version=1.10.0,dev_serial=GSFB2204200410007425,log_type=1,sub_type=1,
# attack_mac=00:68:eb:bb:c7:c6,attack_ip=192.168.73.98,response_ip=192.168.73.37,
# response_port=65536,line_id=1,Iface_type=1,Vlan_id=0,log_time=1747274810
#
# 心跳日志示例 (log_type=2):
# syslog_version=1.10.0,dev_serial=GSFB2204200410007425,log_type=2,
# sentry_count=6453,real_host_count=673,dev_start_time=1747274780,
# dev_end_time=-1,time=2025-05-15 10:06:50

input {
  # TCP输入 - 接收rsyslog（无TLS）
  tcp {
    port => 9080
    codec => plain
    type => "syslog-raw"
    tags => ["rsyslog"]
  }

  # TCP输入 - TLS加密（未来使用）
  # tcp {
  #   port => 9081
  #   codec => plain
  #   type => "syslog-raw"
  #   tags => ["rsyslog", "tls"]
  #   ssl_enable => true
  #   ssl_cert => "/usr/share/logstash/certs/server.crt"
  #   ssl_key => "/usr/share/logstash/certs/server.key"
  #   ssl_verify => false
  # }
}

filter {
  # ========================================================================
  # 阶段1: 基础解析 (ETL - 只做数据转换，不做业务验证)
  # ========================================================================
  if [type] == "syslog-raw" {
    kv {
      source => "message"
      field_split => ","
      value_split => "="
      trim_key => " "
      trim_value => " "
    }
  }

  # ========================================================================
  # 阶段2: 轻量级数据标准化 (保持snake_case，符合HTTP API规范)
  # ========================================================================

  # 攻击日志处理 (log_type=1)
  if [log_type] == "1" {
    mutate {
      add_tag => ["attack-log"]

      # 保持snake_case字段名 (HTTP API期望格式)
      # 不做camelCase转换，因为目标是data-ingestion HTTP API

      # 移除不必要的字段重命名 - 直接使用原始snake_case
    }

    # 基础时间戳处理
    if [log_time] {
      date {
        match => ["log_time", "UNIX"]
        target => "@timestamp"
      }

      # 生成ISO8601格式的timestamp字段
      ruby {
        code => "event.set('timestamp', Time.at(event.get('log_time').to_i).utc.iso8601)"
      }
    }

    # 轻量级MAC地址标准化
    if [attack_mac] {
      mutate {
        uppercase => ["attack_mac"]
        gsub => [
          "attack_mac", "-", ":"
        ]
      }
    }

    # 基础类型转换
    mutate {
      convert => {
        "response_port" => "integer"
        "log_time" => "integer"
        "sub_type" => "integer"
        "line_id" => "integer"
        "Iface_type" => "integer"
        "Vlan_id" => "integer"
      }
    }
  }

  # 心跳日志处理 (log_type=2)
  else if [log_type] == "2" {
    mutate {
      add_tag => ["heartbeat-log"]

      # 保持snake_case字段名
    }

    # 基础时间处理
    if [time] {
      date {
        match => ["time", "yyyy-MM-dd HH:mm:ss"]
        target => "@timestamp"
      }
    }

    # 基础类型转换
    mutate {
      convert => {
        "sentry_count" => "integer"
        "real_host_count" => "integer"
        "dev_start_time" => "integer"
        "dev_end_time" => "integer"
      }
    }
  }

  # ========================================================================
  # 阶段3: 准备HTTP输出格式
  # ========================================================================

  # 添加处理时间戳
  ruby {
    code => "event.set('logstash_processed_at', Time.now.utc.iso8601)"
  }

  # 确保原始message字段保留（用于data-ingestion解析）
  # data-ingestion服务会从message字段提取并验证数据
}

output {
  # ========================================================================
  # 输出1: 有效日志 → HTTP到data-ingestion服务
  # ========================================================================
  if ("attack-log" in [tags] or "heartbeat-log" in [tags]) {
    http {
      url => "http://data-ingestion:8080/api/v1/logs/ingest"
      http_method => "post"
      format => "json"
      content_type => "application/json"

# 设置了 format => "json"。
# 这个设置会自动将整个 Logstash 事件（包含您在 filter 中解析的所有字段，如 log_type, attack_mac, @timestamp 以及 message 本身）
# 序列化为一个 JSON 对象，并将其作为 HTTP 请求的 body 发送。http 插件没有一个名为 body 的顶层设置。format 设置就是用来定义 body 的。您应该直接删除 body => "%{message}" 这一行。

      # 发送原始syslog消息，让data-ingestion处理解析和验证
      #  body => "%{message}"

      # 重试配置
      retry_failed => true
    #   retry_max => 3
    #   retry_delay => 1000

      # 错误处理
      socket_timeout => 30
      connect_timeout => 10
    }
  }

  # ========================================================================
  # 输出2: 调试输出 (开发环境)
  # ========================================================================
  if [log_type] {
    stdout {
      codec => rubydebug {
        metadata => true
      }
    }
  }

  # ========================================================================
  # 输出3: 备用文件输出 (如果HTTP失败)
  # ========================================================================
  if ("attack-log" in [tags] or "heartbeat-log" in [tags]) {
    file {
      path => "/tmp/production_test_logs/http_output_%{+YYYY-MM-dd}.log"
      codec => json_lines
    }
  }
}
