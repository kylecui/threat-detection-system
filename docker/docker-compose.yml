# the attribute `version` is obsolete, it will be ignored, please remove it to avoid potential confusion
# version: '3.8'

# Environment optimization to prevent layer caching issues
x-common-env: &common-env
  # Production logging (no DEBUG output)
  LOGGING_LEVEL_ROOT: "WARN"
  LOGGING_LEVEL_COM_THREATDETECTION: "INFO"
  LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_KAFKA: "INFO"
  LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_WEB: "INFO"
  
  # Hibernate optimization
  SPRING_JPA_OPEN_IN_VIEW: "true"
  SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL: "false"

services:
  postgres:
    image: postgres:15-alpine
    hostname: postgres
    container_name: postgres
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB: threat_detection
      POSTGRES_USER: threat_user
      POSTGRES_PASSWORD: threat_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./01-init-db-production-safe.sql:/docker-entrypoint-initdb.d/01-init-db-production-safe.sql
      - ./17-customers-init.sql:/docker-entrypoint-initdb.d/17-customers-init.sql
      - ./02-attack-events-storage.sql:/docker-entrypoint-initdb.d/02-attack-events-storage.sql
      - ./03-port-weights.sql:/docker-entrypoint-initdb.d/03-port-weights.sql
      - ./04-alert-management-tables.sql:/docker-entrypoint-initdb.d/04-alert-management-tables.sql
      - ./04-threat-assessment-tables.sql:/docker-entrypoint-initdb.d/04-threat-assessment-tables.sql
      - ./05-notification-config-tables.sql:/docker-entrypoint-initdb.d/05-notification-config-tables.sql
      - ./06-ip-segment-weights.sql:/docker-entrypoint-initdb.d/06-ip-segment-weights.sql
      - ./07-whitelist-config.sql:/docker-entrypoint-initdb.d/07-whitelist-config.sql
      - ./08-threat-labels.sql:/docker-entrypoint-initdb.d/08-threat-labels.sql
      - ./09-add-missing-fields.sql:/docker-entrypoint-initdb.d/09-add-missing-fields.sql
      - ./12-ip-segment-weights-v4.sql:/docker-entrypoint-initdb.d/12-ip-segment-weights-v4.sql
      - ./13-customer-port-weights.sql:/docker-entrypoint-initdb.d/13-customer-port-weights.sql
      - ./14-apt-temporal-accumulations.sql:/docker-entrypoint-initdb.d/14-apt-temporal-accumulations.sql
      - ./15-attack-phase-port-configs.sql:/docker-entrypoint-initdb.d/15-attack-phase-port-configs.sql
      - ./16-temporal-device-mapping.sql:/docker-entrypoint-initdb.d/16-temporal-device-mapping.sql
      - ./17-customer-time-weights.sql:/docker-entrypoint-initdb.d/17-customer-time-weights.sql
      - ./18-net-segment-weights.sql:/docker-entrypoint-initdb.d/18-net-segment-weights.sql
      - ./19-device-inventory.sql:/docker-entrypoint-initdb.d/19-device-inventory.sql
      - ./20-topology-snapshots.sql:/docker-entrypoint-initdb.d/20-topology-snapshots.sql
      - ./21-discovered-hosts.sql:/docker-entrypoint-initdb.d/21-discovered-hosts.sql
      - ./22-threat-indicators.sql:/docker-entrypoint-initdb.d/22-threat-indicators.sql
      - ./23-threat-intel-feeds.sql:/docker-entrypoint-initdb.d/23-threat-intel-feeds.sql
      - ./24-threat-intel-feed-seeds.sql:/docker-entrypoint-initdb.d/24-threat-intel-feed-seeds.sql
      - ./25-threat-indicators-phase2-upgrade.sql:/docker-entrypoint-initdb.d/25-threat-indicators-phase2-upgrade.sql
      - ./27-ml-weight-columns.sql:/docker-entrypoint-initdb.d/27-ml-weight-columns.sql
    networks:
      - threat-detection-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U threat_user -d threat_detection"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    hostname: zookeeper
    container_name: zookeeper
    ports: ["2181:2181"]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - threat-detection-network

  redis:
    image: redis:7-alpine
    hostname: redis
    container_name: redis
    ports: ["6379:6379"]
    command: redis-server --appendonly yes
    networks:
      - threat-detection-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  logstash:
    build: ../infrastructure/logging/logstash
    container_name: logstash
    depends_on:
      - kafka
    ports:
      - "9080:9080/tcp"  # rsyslog 无 TLS
      - "9081:9081/tcp"  # rsyslog TLS 预留
      - "9600:9600"      # 监控 API
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
    volumes:
      - logstash_data:/usr/share/logstash/data
      - logstash_logs:/usr/share/logstash/logs
    networks:
      - threat-detection-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9600/_node/stats"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  emqx:
    image: emqx/emqx:5.5.1
    hostname: emqx
    container_name: emqx
    ports:
      - "1883:1883"      # MQTT TCP
      - "8883:8883"      # MQTT TLS (预留)
      - "8083:8083"      # MQTT WebSocket
      - "18083:18083"    # EMQX Dashboard
    environment:
      EMQX_NAME: threat-detection-emqx
      EMQX_HOST: emqx
      # Allow anonymous for dev; production should disable
      EMQX_ALLOW_ANONYMOUS: "true"
      EMQX_LOADED_PLUGINS: "emqx_dashboard"
      EMQX_LISTENER__TCP__EXTERNAL: "1883"
      EMQX_LISTENER__WS__EXTERNAL: "8083"
    volumes:
      - emqx_data:/opt/emqx/data
      - emqx_log:/opt/emqx/log
    networks:
      - threat-detection-network
    healthcheck:
      test: ["CMD", "emqx", "ctl", "status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    hostname: kafka
    container_name: kafka
    depends_on:
      - zookeeper
    ports: ["9092:9092", "9101:9101"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    networks:
      - threat-detection-network
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  data-ingestion:
    build:
      context: ../services/data-ingestion
      dockerfile: Dockerfile
      # ✅ Prevent layer caching issues
      cache_from: []
      # Build args to invalidate cache on timestamp changes
      args:
        BUILD_DATE: ${BUILD_DATE:-$(date -u +'%Y-%m-%dT%H:%M:%SZ')}
    image: data-ingestion:latest
    hostname: data-ingestion
    container_name: data-ingestion-service
    depends_on:
      - kafka
      - redis
    ports: ["8080:8080"]
    environment:
      <<: *common-env
      SPRING_PROFILES_ACTIVE: docker
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    networks:
      - threat-detection-network
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    # ✅ Production resource limits
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1G
        reservations:
          cpus: '1.0'
          memory: 768M
    restart: unless-stopped

  stream-processing:
    build:
      context: ../services/stream-processing
      dockerfile: Dockerfile
      # ✅ Prevent layer caching issues
      cache_from: []
      args:
        BUILD_DATE: ${BUILD_DATE:-$(date -u +'%Y-%m-%dT%H:%M:%SZ')}
    image: stream-processing:latest
    hostname: stream-processing
    container_name: stream-processing
    depends_on:
      kafka:
        condition: service_healthy
      threat-assessment:
        condition: service_started
      topic-init:
        condition: service_completed_successfully
    ports: ["8081:8081"]
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: stream-processing
        parallelism.default: 1
        taskmanager.numberOfTaskSlots: 1
        rest.port: 8081
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      INPUT_TOPIC: attack-events
      STATUS_TOPIC: status-events
      OUTPUT_TOPIC: threat-alerts
      AGGREGATION_TOPIC: minute-aggregations
      
      # ✅ 端口权重服务配置 (Port Weight Service Integration)
      THREAT_ASSESSMENT_SERVICE_URL: http://threat-assessment:8082
      THREAT_INTEL_SERVICE_URL: http://threat-intelligence:8085
      
      # ✅ 时间窗口配置（可自定义）
      # 时长配置（单位：秒，推荐范围见下方说明）
      TIER1_WINDOW_SECONDS: "30"        # Tier 1 窗口时长（默认30秒，推荐范围：10-300秒）
      TIER2_WINDOW_SECONDS: "300"       # Tier 2 窗口时长（默认5分钟=300秒，推荐范围：60-1800秒）
      TIER3_WINDOW_SECONDS: "900"       # Tier 3 窗口时长（默认15分钟=900秒，推荐范围：300-7200秒）
      
      # 窗口名称配置（可自定义，用于告警描述）
      TIER1_WINDOW_NAME: "勒索软件快速检测"    # Tier 1 窗口名称
      TIER2_WINDOW_NAME: "主要威胁检测"        # Tier 2 窗口名称
      TIER3_WINDOW_NAME: "APT慢速扫描检测"     # Tier 3 窗口名称
    networks:
      - threat-detection-network
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/overview"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    # ✅ Resource limits for Flink
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.5'
          memory: 1.5G
    restart: unless-stopped

  taskmanager:
    build:
      context: ../services/stream-processing
      dockerfile: Dockerfile
    hostname: taskmanager
    container_name: taskmanager
    depends_on:
      stream-processing:
        condition: service_started
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: stream-processing
        taskmanager.numberOfTaskSlots: 2
        taskmanager.memory.process.size: 1728m
    command: "taskmanager"
    networks:
      - threat-detection-network
    restart: unless-stopped

  threat-assessment:
    build:
      context: ../services/threat-assessment
      dockerfile: Dockerfile
      # ✅ Prevent layer caching issues
      cache_from: []
      args:
        BUILD_DATE: ${BUILD_DATE:-$(date -u +'%Y-%m-%dT%H:%M:%SZ')}
    image: threat-assessment:latest
    hostname: threat-assessment
    container_name: threat-assessment-service
    depends_on:
      - kafka
      - postgres
    ports: ["8083:8083"]
    environment:
      <<: *common-env
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8083
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/threat_detection
      SPRING_DATASOURCE_USERNAME: threat_user
      SPRING_DATASOURCE_PASSWORD: threat_password
      ML_WEIGHT_ENABLED: "true"
      ML_WEIGHT_CACHE_TTL: "300"
    networks:
      - threat-detection-network
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8083/api/v1/assessment/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    # ✅ Production resource limits
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
    restart: unless-stopped

  alert-management:
    build:
      context: ../services/alert-management
      dockerfile: Dockerfile
      # ✅ Prevent layer caching issues - this was the root cause of past bugs!
      cache_from: []
      args:
        BUILD_DATE: ${BUILD_DATE:-$(date -u +'%Y-%m-%dT%H:%M:%SZ')}
    image: alert-management:latest
    hostname: alert-management
    container_name: alert-management-service
    depends_on:
      - kafka
      - postgres
    ports: ["8082:8082"]
    environment:
      <<: *common-env
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/threat_detection
      SPRING_DATASOURCE_USERNAME: threat_user
      SPRING_DATASOURCE_PASSWORD: threat_password
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_MAIL_HOST: smtp.163.com
      SPRING_MAIL_PORT: 25
      SPRING_MAIL_USERNAME: threat_detection@163.com
      SPRING_MAIL_PASSWORD: ${SMTP_PASSWORD:-changeme}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "true"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: "false"
      INTEGRATION_TEST_EMAIL_RECIPIENT: kylecui@outlook.com
    networks:
      - threat-detection-network
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    # ✅ Production resource limits
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
    restart: unless-stopped

  customer-management:
    build:
      context: ../services/customer-management
      dockerfile: Dockerfile
      # ✅ Prevent layer caching issues
      cache_from: []
      args:
        BUILD_DATE: ${BUILD_DATE:-$(date -u +'%Y-%m-%dT%H:%M:%SZ')}
    image: customer-management:latest
    hostname: customer-management
    container_name: customer-management-service
    depends_on:
      - postgres
    ports: ["8084:8084"]
    environment:
      <<: *common-env
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/threat_detection
      SPRING_DATASOURCE_USERNAME: threat_user
      SPRING_DATASOURCE_PASSWORD: threat_password
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,metrics,prometheus,mappings
    networks:
      - threat-detection-network
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8084/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    # ✅ Production resource limits
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1.5G
        reservations:
          cpus: '1.0'
          memory: 1G
    restart: unless-stopped

  threat-intelligence:
    build:
      context: ../services/threat-intelligence
      dockerfile: Dockerfile
      cache_from: []
      args:
        BUILD_DATE: ${BUILD_DATE:-$(date -u +'%Y-%m-%dT%H:%M:%SZ')}
    image: threat-intelligence:latest
    hostname: threat-intelligence
    container_name: threat-intelligence-service
    depends_on:
      postgres:
        condition: service_healthy
    ports: ["8085:8085"]
    environment:
      <<: *common-env
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/threat_detection
      SPRING_DATASOURCE_USERNAME: threat_user
      SPRING_DATASOURCE_PASSWORD: threat_password
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      ABUSEIPDB_API_KEY: ${ABUSEIPDB_API_KEY:-}
      OTX_API_KEY: ${OTX_API_KEY:-}
      VIRUSTOTAL_API_KEY: ${VIRUSTOTAL_API_KEY:-}
      GREYNOISE_API_KEY: ${GREYNOISE_API_KEY:-}
      FEED_POLLER_ENABLED: ${FEED_POLLER_ENABLED:-true}
    networks:
      - threat-detection-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8085/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    restart: unless-stopped

  api-gateway:
    build:
      context: ../services/api-gateway
      dockerfile: Dockerfile
      # ✅ Prevent layer caching issues
      cache_from: []
      args:
        BUILD_DATE: ${BUILD_DATE:-$(date -u +'%Y-%m-%dT%H:%M:%SZ')}
    image: api-gateway:latest
    hostname: api-gateway
    container_name: api-gateway
    depends_on:
      - redis
      - customer-management
      - data-ingestion
      - threat-assessment
      - alert-management
    ports: ["8888:8888"]
    environment:
      <<: *common-env
      SPRING_PROFILES_ACTIVE: docker
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVER_PORT: 8888
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_CAPACITY: 100
      RATE_LIMIT_REFILL_RATE: 10
    networks:
      - threat-detection-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8888/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    # ✅ Production resource limits
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1.5G
        reservations:
          cpus: '1.0'
          memory: 1G
    restart: unless-stopped

  config-server:
    build:
      context: ../services/config-server
      dockerfile: Dockerfile
      # ✅ Prevent layer caching issues
      cache_from: []
      args:
        BUILD_DATE: ${BUILD_DATE:-$(date -u +'%Y-%m-%dT%H:%M:%SZ')}
    image: config-server:latest
    hostname: config-server
    container_name: config-server
    ports: ["8899:8899"]
    environment:
      <<: *common-env
      SPRING_PROFILES_ACTIVE: native
      SERVER_PORT: 8899
      CONFIG_REPO_PATH: file:/config-repo
    volumes:
      - ../config-repo:/config-repo:ro
    networks:
      - threat-detection-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8899/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    restart: unless-stopped

  ml-detection:
    build:
      context: ../services/ml-detection
      dockerfile: Dockerfile
    image: ml-detection:latest
    hostname: ml-detection
    container_name: ml-detection-service
    depends_on:
      - kafka
      - postgres
    ports: ["8086:8086"]
    environment:
      ML_SERVICE_PORT: 8086
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_INPUT_TOPIC: threat-alerts
      KAFKA_OUTPUT_TOPIC: ml-threat-detections
      KAFKA_CONSUMER_GROUP: ml-detection-consumer
      MODEL_DIR: /app/models
      ML_CONFIDENCE_THRESHOLD: 0.3
      ML_DEFAULT_WEIGHT: 1.0
      DATABASE_URL: postgresql://threat_user:threat_password@postgres:5432/threat_detection
      LOG_LEVEL: INFO
    networks:
      - threat-detection-network
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8086/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
    restart: unless-stopped

  topic-init:
    image: confluentinc/cp-kafka:7.4.0
    hostname: topic-init
    container_name: topic-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >-
      "
      kafka-topics --bootstrap-server kafka:29092 --if-not-exists --create --replication-factor 1 --partitions 1 --topic attack-events &&
      kafka-topics --bootstrap-server kafka:29092 --if-not-exists --create --replication-factor 1 --partitions 1 --topic status-events &&
      kafka-topics --bootstrap-server kafka:29092 --if-not-exists --create --replication-factor 1 --partitions 1 --topic threat-alerts &&
      kafka-topics --bootstrap-server kafka:29092 --if-not-exists --create --replication-factor 1 --partitions 1 --topic minute-aggregations &&
      kafka-topics --bootstrap-server kafka:29092 --if-not-exists --create --replication-factor 1 --partitions 1 --topic device-health-alerts &&
      kafka-topics --bootstrap-server kafka:29092 --if-not-exists --create --replication-factor 1 --partitions 1 --topic ml-threat-detections
      "
    networks:
      - threat-detection-network
    restart: "no"

volumes:
  postgres_data:
  logstash_data:
  logstash_logs:
  emqx_data:
  emqx_log:

networks:
  threat-detection-network:
    name: threat-detection-network
