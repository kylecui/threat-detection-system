version: '3.8'

# ✅ Common environment variables for consistent config
x-common-env: &common-env
  LOGGING_LEVEL_ROOT: "WARN"
  LOGGING_LEVEL_COM_THREATDETECTION: "INFO"
  SPRING_JPA_OPEN_IN_VIEW: "true"
  SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL: "false"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: threat-detection-postgres
    environment:
      POSTGRES_DB: threat_detection
      POSTGRES_USER: threat_user
      POSTGRES_PASSWORD: threat_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/01-init-db-production-safe.sql:/docker-entrypoint-initdb.d/01-init-db-production-safe.sql
      - ./docker/17-customers-init.sql:/docker-entrypoint-initdb.d/17-customers-init.sql
    networks:
      - threat-detection-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U threat_user -d threat_detection"]
      interval: 10s
      timeout: 5s
      retries: 5
    # ✅ Production resource limits
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    restart: unless-stopped

  # Customer Management Service
  customer-management:
    build:
      context: ./services/customer-management
      dockerfile: Dockerfile
      # ✅ Prevent layer caching issues
      cache_from: []
      args:
        BUILD_DATE: ${BUILD_DATE:-$(date -u +'%Y-%m-%dT%H:%M:%SZ')}
    image: customer-management:latest
    container_name: customer-management-service
    environment:
      <<: *common-env
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/threat_detection
      SPRING_DATASOURCE_USERNAME: threat_user
      SPRING_DATASOURCE_PASSWORD: threat_password
      SERVER_PORT: 8084
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - threat-detection-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8084/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    # ✅ Production resource limits
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1.5G
        reservations:
          cpus: '1.0'
          memory: 1G
    restart: unless-stopped

volumes:
  postgres-data:
    driver: local

networks:
  threat-detection-network:
    driver: bridge
